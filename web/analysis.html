<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>任务分析</title>
<link rel="stylesheet" href="/css888/styles.css?v=20260705" />
<style>
  .page-head { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .page-head .sep { width: 100%; border: none; border-top: 1px solid var(--line); margin: 0; }
  .market-btn { display: inline-flex; align-items: center; justify-content: center; min-height: 34px; border: 1px solid var(--line); border-radius: 6px; background: var(--panel); color: var(--muted); padding: 0 16px; cursor: pointer; font-weight: 700; font-size: 13px; user-select: none; }
  .market-btn:hover { background: #f5f0e8; }
  .market-btn.active { background: #e1f3f6; color: var(--accent-2); border-color: var(--accent-2); }
  .market-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; background: #fffdf8; }
  table { border-collapse: collapse; table-layout: fixed; }
  th, td { border-bottom: 1px solid rgba(46,42,36,0.1); padding: 6px 8px; text-align: left; white-space: nowrap; font-size: 12px; }
  th { position: sticky; top: 0; z-index: 2; background: #eee7d9; color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; user-select: none; }
  .sticky-left { position: sticky; left: 0; z-index: 3; background: #eee7d9; }
  .sticky-left td { background: #fffdf8; }
  .sticky-left th { background: #eee7d9; }
  th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; width: 84px; }
  th.sticky-left, td.sticky-left { width: 72px; }
  th .job-sub { font-size: 12px; font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--muted); display: block; margin-top: 6px; }
  th .job-name { font-size: 14px; font-weight: 700; }
  th .job-start { font-size: 12px; font-weight: 400; color: var(--muted); margin-left: 4px; }
  .job-divider { border-right: 2px solid var(--line-strong); }
  .row-total { font-weight: 700; border-top: 2px solid rgba(46,42,36,0.15); }
  .empty { color: var(--muted); text-align: center; padding: 18px; }
  .total-mode-section { margin-top: 14px; }
  .total-mode-section h3 { margin: 0 0 8px; font-size: 13px; color: var(--accent); }
  .total-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .total-card { border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; background: #fffdf8; }
  .total-card .name { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; }
  .total-card .value { font-size: 14px; font-weight: 700; margin-top: 4px; }
  .total-card .token { font-weight: 400; color: var(--muted); font-size: 12px; }
  .total-card .usd { color: #22a6b3; font-weight: 400; font-size: 11px; }
  .total-card .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .job-selector { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .job-selector button { font-size: 12px; padding: 4px 12px; border: 1px solid #bbb; border-radius: 20px; background: #fff; color: #666; cursor: pointer; white-space: nowrap; transition: all .15s; }
  .job-selector button:hover { background: #e8f5e9; border-color: #81c784; color: #388e3c; }
  .job-selector button.selected { background: #81c784; border-color: #66bb6a; color: #fff; font-weight: 700; }
  .page-sep { width: 100%; border: none; border-top: 1px solid var(--line); margin: 14px 0; }
  .analysis-extra { margin-top: 4px; }
  .analysis-panel { border: 1px solid var(--line); border-radius: 8px; background: #fffdf8; padding: 14px; }
  .chart-wrap { overflow-x: auto; }
  .chart-wrap svg { display: block; }
  .bar-group-label { font-size: 10px; fill: #666; text-anchor: middle; }
  .bar-rect { cursor: pointer; }
  .bar-rect:hover { stroke: #333; stroke-width: 1.5; }
  .chart-legend { font-size: 10px; }
  .chart-legend rect { cursor: pointer; }
  .chart-group-btn { font-size: 11px; padding: 3px 10px; border: 1px solid var(--line); border-radius: 4px; background: transparent; color: var(--muted); cursor: pointer; min-height: auto; font-weight: 700; }
  .chart-group-btn:hover { background: #f5f0e8; }
  .chart-group-btn.active { background: #4a7c8c; color: #fff; border-color: #4a7c8c; }
  .chart-axis-label { font-size: 11px; fill: #333; text-anchor: middle; }
  .chart-tooltip { position: fixed; background: rgba(0,0,0,.8); color: #fff; font-size: 11px; padding: 4px 8px; border-radius: 4px; pointer-events: none; white-space: nowrap; z-index: 100; }
</style>
</head>
<body>
<main class="shell">
  <div class="page-head">
    <h2 style="margin-bottom:0">任务分析</h2>
    <hr class="sep">
    <div style="display:flex;gap:6px">
      <button class="market-btn active" data-market="spot" id="btnSpot">SPOT</button>
      <button class="market-btn" data-market="um" id="btnUm">UM</button>
    </div>
  </div>

  <div id="jobSelector" class="job-selector" style="display:none"></div>

  <hr class="page-sep" id="tableSep" style="display:none">

  <div id="loading" class="empty">加载中...</div>

  <div id="tableSection" style="display:none">
    <div class="table-wrap">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div id="totalModeSection" class="total-mode-section" style="display:none"></div>
  </div>

  <div id="analysisExtra" class="analysis-extra" style="display:none">
    <hr class="page-sep">

    <div class="analysis-panel">
      <div style="display:flex;align-items:center;gap:8px;margin:0 0 10px">
        <h3 style="margin:0;font-size:13px;color:var(--accent)">每 $1 奖励所需<span id="chartStatLabel">均值</span>成交量</h3>
        <div id="chartStatToggle" class="btn-group">
          <button class="chart-group-btn active" data-stat="avg">均值</button>
          <button class="chart-group-btn" data-stat="med">中位数</button>
          <button class="chart-group-btn" data-stat="q1">Q1</button>
          <button class="chart-group-btn" data-stat="last">末位</button>
        </div>
        <div id="chartGroupToggle" class="btn-group" style="margin-left:auto">
          <button class="chart-group-btn active" data-mode="tier">按排名分档</button>
          <button class="chart-group-btn" data-mode="job">按任务分组</button>
        </div>
      </div>
      <div id="efficiencyWrap" class="chart-wrap">
        <svg id="efficiencyChart" height="400"></svg>
      </div>
    </div>

    <hr class="page-sep">

    <div class="analysis-panel">
      <div id="ratioSection">
        <div style="display:flex;align-items:center;gap:8px;margin:0 0 10px">
          <h3 style="margin:0;font-size:13px;color:var(--accent)">分档成交占比</h3>
          <div id="ratioGroupToggle" class="btn-group" style="margin-left:auto">
            <button class="chart-group-btn active" data-mode="tier">按排名分档</button>
            <button class="chart-group-btn" data-mode="job">按任务分组</button>
          </div>
        </div>
        <div id="ratioWrap" class="chart-wrap">
          <svg id="ratioChart" height="400"></svg>
        </div>
      </div>
      <div id="dailyGradeSection" style="display:none">
        <div style="display:flex;align-items:center;gap:8px;margin:0 0 10px">
          <h3 style="margin:0;font-size:13px;color:var(--accent)">日均分数</h3>
          <span style="font-size:11px;color:var(--muted)">活动天数 = (结束 - 开始) 天数</span>
          <div id="dailyGradeStatToggle" class="btn-group">
            <button class="chart-group-btn active" data-stat="avg">均值</button>
            <button class="chart-group-btn" data-stat="med">中位数</button>
            <button class="chart-group-btn" data-stat="q1">Q1</button>
            <button class="chart-group-btn" data-stat="last">末位</button>
          </div>
          <div id="dailyGradeGroupToggle" class="btn-group" style="margin-left:auto">
            <button class="chart-group-btn active" data-mode="tier">按排名分档</button>
            <button class="chart-group-btn" data-mode="job">按任务分组</button>
          </div>
        </div>
        <div id="dailyGradeWrap" class="chart-wrap">
          <svg id="dailyGradeChart" height="400"></svg>
        </div>
      </div>
    </div>

    <hr class="page-sep">

    <div class="analysis-panel">
      <div style="display:flex;align-items:center;gap:8px;margin:0 0 10px">
        <h3 style="margin:0;font-size:13px;color:var(--accent)">分档 <span id="distStatLabel">中位数</span> / 均值 (%)</h3>
        <div id="distStatToggle" class="btn-group">
          <button class="chart-group-btn active" data-stat="med">中位数</button>
          <button class="chart-group-btn" data-stat="q1">Q1</button>
          <button class="chart-group-btn" data-stat="last">末位</button>
        </div>
        <div id="distGroupToggle" class="btn-group" style="margin-left:auto">
          <button class="chart-group-btn active" data-mode="tier">按排名分档</button>
          <button class="chart-group-btn" data-mode="job">按任务分组</button>
        </div>
      </div>
      <div id="distWrap" class="chart-wrap">
        <svg id="distChart" height="400"></svg>
      </div>
    </div>

    <hr class="page-sep">

    <div class="analysis-panel">
      <h3 style="margin:0 0 8px;font-size:13px;color:var(--accent)">弹力系数</h3>
      <div class="table-wrap">
        <table id="elasticityTable" style="width:auto;min-width:auto">
          <caption style="caption-side:top;font-size:11px;color:var(--muted);padding:0 0 8px;text-align:left">相邻档位成交量比值（&gt;100% 排名升高量反大，&lt;100% 正常衰减）</caption>
          <thead id="elasticityHead"></thead>
          <tbody id="elasticityBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
function escapeHtml(v) { return String(v ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function fmtVolume(v) {
  if (!Number.isFinite(v)) return "—";
  if (v >= 1000000000) return (v / 1000000000).toFixed(2) + "B";
  if (v >= 1000000) return (v / 1000000).toFixed(2) + "M";
  if (v >= 1000) return (v / 1000).toFixed(2) + "K";
  return v.toFixed(2);
}

function tierAmountForRange(tiers, label) {
  if (!tiers || !tiers.length) return null;
  const parts = label.split("~").map(Number);
  if (parts.length !== 2) return null;
  const [rmin, rmax] = parts;
  // Try direct match first
  for (const t of tiers) {
    if (t.rankMin === rmin && t.rankMax === rmax) return t.amount;
  }
  // Partial overlap: sum tiers that overlap this range
  const sorted = [...tiers].sort((a, b) => a.rankMin - b.rankMin);
  const gaps = [];
  let cursor = 1;
  for (const t of sorted) {
    if (t.rankMin > cursor) {
      gaps.push({ rankMin: cursor, rankMax: t.rankMin - 1 });
    }
    cursor = t.rankMax + 1;
  }
  const all = [];
  let c = 1;
  for (const t of sorted) {
    if (t.rankMin > c) all.push({ rankMin: c, rankMax: t.rankMin - 1, amount: 0 });
    all.push({ ...t });
    c = t.rankMax + 1;
  }
  // If the range is a gap range (not explicitly a tier), return null
  const isGap = !sorted.some(t => t.rankMin === rmin && t.rankMax === rmax);
  if (isGap) return null;
  return tiers.find(t => t.rankMin === rmin && t.rankMax === rmax)?.amount ?? null;
}

function tierPerPerson(tiers, label) {
  const amt = tierAmountForRange(tiers, label);
  if (amt == null) return null;
  const parts = label.split("~").map(Number);
  if (parts.length !== 2) return null;
  const count = parts[1] - parts[0] + 1;
  return count > 0 ? amt / count : null;
}

let currentMarket = "spot";
let selectedJobIds = null;
let allRankJobs = [];
let _cachedRanges = [];
let _chartGroupBy = "tier"; // "tier" | "job"
let _ratioGroupBy = "tier"; // "tier" | "job"
let _distGroupBy = "tier"; // "tier" | "job"
let _distStat = "med"; // "med" | "q1" | "last"
let _dailyGradeStat = "avg"; // "avg" | "med" | "q1" | "last"
let _chartStat = "avg"; // "avg" | "med" | "q1" | "last"

const STAT_LABELS = { avg: "均值", med: "中位数", q1: "Q1", last: "末位" };

async function loadAnalysis(market) {
  document.getElementById("loading").style.display = "";
  document.getElementById("tableSection").style.display = "none";
  document.getElementById("tableHead").innerHTML = "";
  document.getElementById("tableBody").innerHTML = "";
  document.getElementById("totalModeSection").style.display = "none";
  document.getElementById("totalModeSection").innerHTML = "";
  document.getElementById("jobSelector").style.display = "none";
  document.getElementById("jobSelector").innerHTML = "";
  document.getElementById("tableSep").style.display = "none";
  document.getElementById("analysisExtra").style.display = "none";

  try {
    const resp = await fetch("/api/analysis?market=" + encodeURIComponent(market));
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();
    renderAnalysis(data);
  } catch (err) {
    document.getElementById("loading").textContent = "加载失败: " + err.message;
  }
}

function renderAnalysis(data) {
  const rawJobs = data.jobs || [];
  const ranges = data.ranges || [];

  document.getElementById("loading").style.display = "none";

  // Only rank-mode jobs in main table
  allRankJobs = rawJobs.filter(j => j.rewardMode === "rank");
  if (!rawJobs.length) {
    document.getElementById("tableSection").style.display = "";
    document.getElementById("tableBody").innerHTML = '<tr><td colspan="100" class="empty">没有数据。</td></tr>';
    return;
  }
  if (!allRankJobs.length) {
    document.getElementById("tableSection").style.display = "";
    document.getElementById("tableBody").innerHTML = '<tr><td colspan="100" class="empty">没有排名模式的任务。</td></tr>';
    return;
  }

  // Job selector — exclude active (未到期) jobs by default
  _cachedRanges = ranges;
  const endedJobs = allRankJobs.filter(j => !j.rewardPriceIsLive);
  selectedJobIds = (endedJobs.length ? endedJobs : allRankJobs).map(j => j.id);
  renderJobSelector(allRankJobs, ranges);
  renderTable(allRankJobs, ranges);
  renderAnalysisExtra(allRankJobs, ranges);
}

function renderJobSelector(jobs, ranges) {
  const sel = document.getElementById("jobSelector");
  sel.style.display = "flex";
  document.getElementById("tableSep").style.display = "";
  const parts = jobs.map((j, i) =>
    `<button class="${selectedJobIds.includes(j.id) ? 'selected' : ''}" data-idx="${i}">${escapeHtml(j.name || j.resourceId || j.id)}</button>`
  ).join("");
  sel.innerHTML = parts;
  sel.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = parseInt(btn.dataset.idx);
      const id = jobs[idx].id;
      const pos = selectedJobIds.indexOf(id);
      if (pos >= 0) {
        selectedJobIds.splice(pos, 1);
        btn.classList.remove("selected");
      } else {
        selectedJobIds.push(id);
        btn.classList.add("selected");
      }
      if (selectedJobIds.length === 0) {
        selectedJobIds.push(id);
        btn.classList.add("selected");
        return;
      }
      renderTable(allRankJobs, ranges);
      renderEfficiencyChart(allRankJobs, ranges);
      renderRatioChart(allRankJobs, ranges);
      renderDistributionChart(allRankJobs, ranges);
    });
  });
}

function renderTable(jobs, ranges) {
  const visible = jobs.filter(j => selectedJobIds.includes(j.id));
  document.getElementById("tableSection").style.display = "";
  if (!visible.length) {
    document.getElementById("tableBody").innerHTML = '<tr><td colspan="100" class="empty">请至少选择一个任务。</td></tr>';
    return;
  }

  const COLS_PER_JOB = 7;
  const table = document.querySelector("#tableSection table");
  // Remove existing colgroup
  const oldCg = table.querySelector("colgroup");
  if (oldCg) oldCg.remove();
  table.style.width = (72 + visible.length * COLS_PER_JOB * 84) + "px";
  const colgroup = document.createElement("colgroup");
  colgroup.innerHTML = '<col style="width:72px">' + '<col style="width:84px">'.repeat(visible.length * COLS_PER_JOB);
  table.insertBefore(colgroup, table.firstChild);

  // Build header: row 1 (job names), row 2 (sub columns)
  const headHtml = ['<tr><th class="sticky-left" rowspan="2">排名区间</th>'];
  for (let ji = 0; ji < visible.length; ji++) {
    const j = visible[ji];
    const name = (j.name || "") + (j.resourceId ? " [" + j.resourceId + "]" : "");
    const cls = ji < visible.length - 1 ? ' class="job-divider"' : '';
    headHtml.push(`<th colspan="${COLS_PER_JOB}"${cls}><span class="job-name">${escapeHtml(name)}</span>`);
    {
      const s = j.activityStart || "";
      const e = j.activityEnd || "";
      if (s || e) {
        let timeStr = "";
        if (s) timeStr += s;
        if (s && e) timeStr += " ~ ";
        if (e) timeStr += e;
        headHtml.push(`<span class="job-start">${escapeHtml(timeStr)}</span>`);
      }
    }
    if (j.rewardToken) {
      let sub = `奖励: ${escapeHtml(j.rewardToken)}`;
      if (j.rewardPriceUsd != null) {
        const priceStr = j.rewardPriceUsd.toLocaleString("en-US", {minimumFractionDigits:4, maximumFractionDigits:8});
        const tagCls = j.rewardPriceIsLive ? ' style="color:#c0392b;font-weight:700"' : '';
        const tag = j.rewardPriceIsLive ? "实时" : "收盘";
        sub += ` (@ $${priceStr} <span${tagCls}>${tag}</span>)`;
      }
      headHtml.push(`<span class="job-sub">${sub}</span>`);
    }
    headHtml.push('</th>');
  }
  headHtml.push('</tr><tr>');
  for (let ji = 0; ji < visible.length; ji++) {
    const sep = ji < visible.length - 1 ? ' job-divider' : '';
    headHtml.push(`<th class="num">总成交量</th><th class="num">分档占比</th><th class="num">均值</th><th class="num">中位</th><th class="num">Q1</th><th class="num">末位</th><th class="num${sep}">人均奖励</th>`);
  }
  headHtml.push('</tr>');
  document.getElementById("tableHead").innerHTML = headHtml.join("");

  // Build body: one row per range
  const bodyParts = [];
  for (let ri = 0; ri < ranges.length; ri++) {
    const r = ranges[ri];
    const label = r.label;
    bodyParts.push(`<tr><td class="sticky-left">${escapeHtml(label)}</td>`);
    for (let ji = 0; ji < visible.length; ji++) {
      const j = visible[ji];
      const rdata = (j.ranges && j.ranges[ri]) ? j.ranges[ri] : null;
      const total = rdata ? rdata.total : 0;
      const pct = rdata ? rdata.pct : 0;
      const avg = rdata ? rdata.avg : 0;
      const med = rdata ? rdata.med : 0;
      const q1 = rdata ? rdata.q1 : 0;
      const last = rdata ? rdata.last : 0;
      const perPerson = tierPerPerson(j.rewardTiers, label);
      let ppStr = "—";
      if (perPerson != null && perPerson > 0) {
        if (j.rewardPriceUsd != null) {
          ppStr = "$" + (perPerson * j.rewardPriceUsd).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
        } else {
          ppStr = perPerson.toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
        }
      }
      const sep = ji < visible.length - 1 ? ' job-divider' : '';
      bodyParts.push(`<td class="num">${fmtVolume(total)}</td><td class="num">${pct}%</td><td class="num">${fmtVolume(avg)}</td><td class="num">${fmtVolume(med)}</td><td class="num">${fmtVolume(q1)}</td><td class="num">${fmtVolume(last)}</td><td class="num${sep}">${ppStr}</td>`);
    }
    bodyParts.push('</tr>');
  }

  // Total row
  bodyParts.push('<tr class="row-total"><td class="sticky-left">合计</td>');
  for (let ji = 0; ji < visible.length; ji++) {
    const j = visible[ji];
    const sep = ji < visible.length - 1 ? ' job-divider' : '';
    bodyParts.push(`<td class="num">${fmtVolume(j.totalVolume)}</td><td class="num">100%</td><td class="num">—</td><td class="num">—</td><td class="num">—</td><td class="num">—</td><td class="num${sep}">—</td>`);
  }
  bodyParts.push('</tr>');

  document.getElementById("tableBody").innerHTML = bodyParts.join("");
}

function renderAnalysisExtra(jobs, ranges) {
  const visible = jobs.filter(j => selectedJobIds.includes(j.id));
  if (!visible.length) return;
  document.getElementById("analysisExtra").style.display = "";
  renderEfficiencyChart(visible, ranges);
  renderRatioChart(visible, ranges);
  renderElasticityTable(visible, ranges);
  renderDistributionChart(visible, ranges);
}

function renderEfficiencyChart(jobs, ranges) {
  const visible = jobs.filter(j => selectedJobIds.includes(j.id));
  if (!visible.length) { document.getElementById("efficiencyChart").innerHTML = ""; return; }
  document.getElementById("chartStatLabel").textContent = STAT_LABELS[_chartStat];

  const JOB_COLORS = ["#2980b9","#e67e22","#27ae60","#c0392b","#8e44ad","#16a085","#d35400","#2c3e50"];
  const TIER_COLORS = ["#e74c3c","#e67e22","#f1c40f","#2ecc71","#3498db","#9b59b6","#1abc9c","#34495e"];

  const groupBy = _chartGroupBy;

  // --- Collect groups ---
  const groups = [];
  if (groupBy === "tier") {
    // Each group = one range, bars = one per visible job
    for (let ri = 0; ri < ranges.length; ri++) {
      const label = ranges[ri].label;
      const bars = [];
      for (let ji = 0; ji < visible.length; ji++) {
        const j = visible[ji];
        if (!j.ranges || !j.ranges[ri]) continue;
        const pp = tierPerPerson(j.rewardTiers, label);
        if (pp == null) continue;
        const ppUsd = pp * (j.rewardPriceUsd ?? 1);
        if (ppUsd <= 0) continue;
        bars.push({ jobIdx: ji, tierIdx: ri, job: j, eff: j.ranges[ri][_chartStat] / ppUsd, tierLabel: label });
      }
      if (bars.length) groups.push({ label, bars, keyIdx: -1 });
    }
  } else {
    // Each group = one job, bars = one per range with data
    for (let ji = 0; ji < visible.length; ji++) {
      const j = visible[ji];
      const bars = [];
      for (let ri = 0; ri < ranges.length; ri++) {
        if (!j.ranges || !j.ranges[ri]) continue;
        const label = ranges[ri].label;
        const pp = tierPerPerson(j.rewardTiers, label);
        if (pp == null) continue;
        const ppUsd = pp * (j.rewardPriceUsd ?? 1);
        if (ppUsd <= 0) continue;
        bars.push({ jobIdx: ji, tierIdx: ri, job: j, eff: j.ranges[ri][_chartStat] / ppUsd, tierLabel: label });
      }
      if (bars.length) {
        const name = j.name || j.resourceId || j.id;
        groups.push({ label: name, bars, keyIdx: ji });
      }
    }
  }
  if (!groups.length) { document.getElementById("efficiencyChart").innerHTML = ""; return; }

  // Find max eff and number of bars per group
  const allEff = groups.flatMap(g => g.bars.map(b => b.eff));
  const maxEff = Math.max(...allEff) || 1;
  const numBars = Math.max(...groups.map(g => g.bars.length));

  // Dimensions
  const W = 60 + groups.length * (numBars * 20 + 24);
  const H = 400, ML = 60, MR = 20, MT = 40, MB = 60;
  const PW = W - ML - MR;
  const PH = H - MT - MB;
  const groupW = PW / groups.length;
  const barW = Math.min(16, groupW / numBars - 2);

  function sy(v) { return MT + PH - (v / maxEff) * PH; }
  function fmtLabel(s) { return s.length > 10 ? escapeHtml(s.slice(0, 9)) + "⋯" : escapeHtml(s); }

  let svg = `<g class="chart-axis">`;

  // Y axis
  svg += `<line x1="${ML}" y1="${MT}" x2="${ML}" y2="${MT + PH}" stroke="#ccc"/>`;
  const yTicks = 5;
  for (let i = 0; i <= yTicks; i++) {
    const v = (maxEff * i / yTicks);
    const y = sy(v);
    svg += `<line x1="${ML - 4}" y1="${y}" x2="${ML}" y2="${y}" stroke="#ccc"/>`;
    svg += `<text x="${ML - 6}" y="${y + 3}" text-anchor="end">${fmtVolume(v)}</text>`;
  }
  svg += `<text class="chart-axis-label" x="14" y="${MT + PH / 2}" transform="rotate(-90,14,${MT + PH / 2})">每 $1 奖励所需${STAT_LABELS[_chartStat]}成交量</text>`;

  // X axis
  svg += `<line x1="${ML}" y1="${MT + PH}" x2="${ML + PW}" y2="${MT + PH}" stroke="#ccc"/>`;

  // Groups + bars
  for (let gi = 0; gi < groups.length; gi++) {
    const g = groups[gi];
    const gx = ML + gi * groupW + groupW / 2;
    svg += `<text class="bar-group-label" x="${gx}" y="${MT + PH + 18}">${fmtLabel(g.label)}</text>`;

    const startX = gx - (g.bars.length * barW + (g.bars.length - 1) * 2) / 2;
    for (let bi = 0; bi < g.bars.length; bi++) {
      const b = g.bars[bi];
      const bx = startX + bi * (barW + 2);
      const bh = (b.eff / maxEff) * PH;
      const by = sy(b.eff);
      const name = escapeHtml(b.job.name || b.job.resourceId || b.job.id);
      const effStr = fmtVolume(b.eff);
      let color;
      if (groupBy === "tier") {
        color = JOB_COLORS[b.jobIdx % JOB_COLORS.length];
      } else {
        color = TIER_COLORS[b.tierIdx % TIER_COLORS.length];
      }
      svg += `<rect class="bar-rect" x="${bx}" y="${by}" width="${barW}" height="${Math.max(bh, 1)}" fill="${color}" opacity=".85"
        onmouseenter="showBarTip(event,'${name}\\n${escapeHtml(b.tierLabel)}\\n每 $1 需成交: ${effStr}')"
        onmousemove="moveBarTip(event)"
        onmouseleave="hideBarTip()"/>`;
    }
    // group average line
    if (g.bars.length >= 2) {
      const avgVal = g.bars.reduce((s, b) => s + b.eff, 0) / g.bars.length;
      const ay = sy(avgVal);
      const lx2 = startX + g.bars.length * barW + (g.bars.length - 1) * 2;
      svg += `<line x1="${startX}" y1="${ay}" x2="${lx2}" y2="${ay}" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>`;
      svg += `<text x="${lx2 + 4}" y="${ay + 3}" font-size="11" fill="#e74c3c">均: ${fmtVolume(avgVal)}</text>`;
    }
  }

  // Legend (vertical, right side)
  let legendW = 0;
  const LEGEND_PAD = 10;
  let legendEntries;
  if (groupBy === "tier") {
    legendEntries = visible.map((j, ji) => ({ label: escapeHtml(j.name || j.resourceId || j.id), color: JOB_COLORS[ji % JOB_COLORS.length] }));
  } else {
    // Collect unique tier labels that have data
    const used = new Set();
    const entries = [];
    for (const g of groups) {
      for (const b of g.bars) {
        if (!used.has(b.tierIdx)) {
          used.add(b.tierIdx);
          entries.push({ label: escapeHtml(b.tierLabel), color: TIER_COLORS[b.tierIdx % TIER_COLORS.length] });
        }
      }
    }
    legendEntries = entries;
  }
  const maxNameLen = Math.max(...legendEntries.map(e => e.label.length)) || 1;
  legendW = maxNameLen * 7 + 26 + LEGEND_PAD;
  const Lx = ML + PW + 10;
  for (let li = 0; li < legendEntries.length; li++) {
    const e = legendEntries[li];
    const yy = MT + 10 + li * 18;
    svg += `<rect x="${Lx}" y="${yy - 8}" width="10" height="10" fill="${e.color}" rx="2"/>`;
    svg += `<text x="${Lx + 16}" y="${yy}" font-size="11" fill="#444">${e.label}</text>`;
  }
  const W2 = ML + PW + 10 + legendW + MR;

  const chartEl = document.getElementById("efficiencyChart");
  chartEl.setAttribute("width", W2);
  chartEl.innerHTML = svg;
}

function renderRatioChart(jobs, ranges) {
  const isUm = currentMarket === "um";
  document.getElementById("ratioSection").style.display = isUm ? "none" : "";
  document.getElementById("dailyGradeSection").style.display = isUm ? "" : "none";
  if (isUm) { renderDailyGradeChart(jobs, ranges); return; }
  const visible = jobs.filter(j => selectedJobIds.includes(j.id));
  if (!visible.length) { document.getElementById("ratioChart").innerHTML = ""; return; }

  const JOB_COLORS = ["#2980b9","#e67e22","#27ae60","#c0392b","#8e44ad","#16a085","#d35400","#2c3e50"];
  const TIER_COLORS = ["#e74c3c","#e67e22","#f1c40f","#2ecc71","#3498db","#9b59b6","#1abc9c","#34495e"];
  const groupBy = _ratioGroupBy;

  // Compute per-job total volume
  const jobTotal = {};
  for (const j of visible) {
    let s = 0;
    for (let ri = 0; ri < ranges.length; ri++) {
      if (j.ranges && j.ranges[ri]) s += (j.ranges[ri].total || 0);
    }
    jobTotal[j.id] = s || 1;
  }

  const groups = [];
  if (groupBy === "tier") {
    for (let ri = 0; ri < ranges.length; ri++) {
      const label = ranges[ri].label;
      const bars = [];
      for (let ji = 0; ji < visible.length; ji++) {
        const j = visible[ji];
        if (!j.ranges || !j.ranges[ri]) continue;
        const v = j.ranges[ri].total;
        if (v == null || v <= 0) continue;
        bars.push({ jobIdx: ji, tierIdx: ri, job: j, pct: v / jobTotal[j.id] * 100, tierLabel: label });
      }
      if (bars.length) groups.push({ label, bars, keyIdx: -1 });
    }
  } else {
    for (let ji = 0; ji < visible.length; ji++) {
      const j = visible[ji];
      const bars = [];
      for (let ri = 0; ri < ranges.length; ri++) {
        if (!j.ranges || !j.ranges[ri]) continue;
        const v = j.ranges[ri].total;
        if (v == null || v <= 0) continue;
        bars.push({ jobIdx: ji, tierIdx: ri, job: j, pct: v / jobTotal[j.id] * 100, tierLabel: ranges[ri].label });
      }
      if (bars.length) {
        const name = j.name || j.resourceId || j.id;
        groups.push({ label: name, bars, keyIdx: ji });

  if (!groups.length) { document.getElementById("ratioChart").innerHTML = ""; return; }

  const allPct = groups.flatMap(g => g.bars.map(b => b.pct));
  const maxPct = Math.min(100, Math.max(...allPct) || 1);
  const numBars = Math.max(...groups.map(g => g.bars.length));

  const W = 60 + groups.length * (numBars * 20 + 24);
  const H = 400, ML = 60, MR = 20, MT = 40, MB = 60;
  const PW = W - ML - MR;
  const PH = H - MT - MB;
  const groupW = PW / groups.length;
  const barW = Math.min(16, groupW / numBars - 2);

  function sy(v) { return MT + PH - (v / maxPct) * PH; }
  function fmtLabel(s) { return s.length > 10 ? escapeHtml(s.slice(0, 9)) + "⋯" : escapeHtml(s); }

  let svg = `<g class="chart-axis">`;

  svg += `<line x1="${ML}" y1="${MT}" x2="${ML}" y2="${MT + PH}" stroke="#ccc"/>`;
  const yTicks = 5;
  for (let i = 0; i <= yTicks; i++) {
    const v = (maxPct * i / yTicks);

  }
  svg += `<text class="chart-axis-label" x="14" y="${MT + PH / 2}" transform="rotate(-90,14,${MT + PH / 2})">成交占比 (%)</text>`;

  svg += `<line x1="${ML}" y1="${MT + PH}" x2="${ML + PW}" y2="${MT + PH}" stroke="#ccc"/>`;

  for (let gi = 0; gi < groups.length; gi++) {
    const g = groups[gi];
    const gx = ML + gi * groupW + groupW / 2;

      const by = sy(b.pct);
      const name = escapeHtml(b.job.name || b.job.resourceId || b.job.id);
      let color;
      if (groupBy === "tier") {
        color = JOB_COLORS[b.jobIdx % JOB_COLORS.length];
      } else {

      }
      svg += `<rect class="bar-rect" x="${bx}" y="${by}" width="${barW}" height="${Math.max(bh, 1)}" fill="${color}" opacity=".85"

      const avgVal = g.bars.reduce((s, b) => s + b.pct, 0) / g.bars.length;
      const ay = sy(avgVal);
      const lx2 = startX + g.bars.length * barW + (g.bars.length - 1) * 2;
      svg += `<line x1="${startX}" y1="${ay}" x2="${lx2}" y2="${ay}" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>`;
      svg += `<text x="${lx2 + 4}" y="${ay + 3}" font-size="11" fill="#e74c3c">均: ${avgVal.toFixed(1)}%</text>`;
    }
  }

  // Legend
  let legendW = 0;
  const LEGEND_PAD = 10;
  let legendEntries;
  if (groupBy === "tier") {
    legendEntries = visible.map((j, ji) => ({ label: escapeHtml(j.name || j.resourceId || j.id), color: JOB_COLORS[ji % JOB_COLORS.length] }));

    const used = new Set();
    const entries = [];
    for (const g of groups) {
      for (const b of g.bars) {
        if (!used.has(b.tierIdx)) {
          used.add(b.tierIdx);
          entries.push({ label: escapeHtml(b.tierLabel), color: TIER_COLORS[b.tierIdx % TIER_COLORS.length] });
        }
      }
    }
    legendEntries = entries;
  }
  const maxNameLen = Math.max(...legendEntries.map(e => e.label.length)) || 1;
  legendW = maxNameLen * 7 + 26 + LEGEND_PAD;
  const Lx = ML + PW + 10;
  for (let li = 0; li < legendEntries.length; li++) {
    const e = legendEntries[li];
    const yy = MT + 10 + li * 18;
    svg += `<rect x="${Lx}" y="${yy - 8}" width="10" height="10" fill="${e.color}" rx="2"/>`;
    svg += `<text x="${Lx + 16}" y="${yy}" font-size="11" fill="#444">${e.label}</text>`;

  const W2 = ML + PW + 10 + legendW + MR;

  const chartEl = document.getElementById("ratioChart");

// Bar chart tooltip
let _barTip = null;
function showBarTip(evt, html) {
  if (!_barTip) {
    _barTip = document.createElement("div");
    _barTip.className = "chart-tooltip";
    document.body.appendChild(_barTip);
  }
  _barTip.style.display = "";
  _barTip.innerHTML = html.replace(/\n/g, "<br>");
  _barTip.style.left = (evt.clientX + 14) + "px";
  _barTip.style.top = (evt.clientY - 8) + "px";
}
function moveBarTip(evt) {
  if (_barTip) {
    _barTip.style.left = (evt.clientX + 14) + "px";
    _barTip.style.top = (evt.clientY - 8) + "px";
  }
}
function hideBarTip() {
  if (_barTip) _barTip.style.display = "none";
}

function renderDailyGradeChart(jobs, ranges) {
  const visible = jobs.filter(j => selectedJobIds.includes(j.id));
  if (!visible.length) { document.getElementById("dailyGradeChart").innerHTML = ""; return; }

  const JOB_COLORS = ["#2980b9","#e67e22","#27ae60","#c0392b","#8e44ad","#16a085","#d35400","#2c3e50"];
  const TIER_COLORS = ["#e74c3c","#e67e22","#f1c40f","#2ecc71","#3498db","#9b59b6","#1abc9c","#34495e"];

  function parseDate(s) {
    if (!s) return null;
    const m = s.match(/^(\d{4})-(\d{2})-(\d{2})(?:\s+(\d{1,2}):(\d{2}))?/);
    if (!m) return null;
    return new Date(m[1], m[2] - 1, m[3], m[4] || 0, m[5] || 0);
  }

  function activityDays(job) {
    const start = parseDate(job.activityStart);
    if (!start) return 1;
    if (job.activityEnd) {
      const end = parseDate(job.activityEnd);
      if (!end) return 1;
      if (end.getTime() <= Date.now()) {
        const days = (end.getTime() - start.getTime()) / (24 * 60 * 60 * 1000);
        return Math.ceil(days);
      }
    }
    const days = (Date.now() - start.getTime()) / (24 * 60 * 60 * 1000);
    return Math.floor(days + 0.7);
  }

  const groupBy = _ratioGroupBy;
  const groups = [];

  if (groupBy === "tier") {
    for (let ri = 0; ri < ranges.length; ri++) {
      const label = ranges[ri].label;
      const bars = [];
      for (let ji = 0; ji < visible.length; ji++) {
        const j = visible[ji];
        if (!j.ranges || !j.ranges[ri]) continue;
        const days = activityDays(j);
        const val = j.ranges[ri][_dailyGradeStat];
        if (!val || val <= 0) continue;
        bars.push({ jobIdx: ji, tierIdx: ri, job: j, value: val / days, tierLabel: label });
      }
      if (bars.length) groups.push({ label, bars, keyIdx: -1 });
    }
  } else {
    for (let ji = 0; ji < visible.length; ji++) {
      const j = visible[ji];
      const name = j.name || j.resourceId || j.id;
      const days = activityDays(j);
      const bars = [];
      for (let ri = 0; ri < ranges.length; ri++) {
        if (!j.ranges || !j.ranges[ri]) continue;
        const val = j.ranges[ri][_dailyGradeStat];
        if (!val || val <= 0) continue;
        bars.push({ jobIdx: ji, tierIdx: ri, job: j, value: val / days, tierLabel: ranges[ri].label });
      }
      if (bars.length) groups.push({ label: name, bars, keyIdx: ji });
    }
  }
  if (!groups.length) { document.getElementById("dailyGradeChart").innerHTML = ""; return; }

  const allVals = groups.flatMap(g => g.bars.map(b => b.value));
  const maxVal = Math.max(...allVals) || 1;
  const numBars = Math.max(...groups.map(g => g.bars.length));

  const W = 60 + groups.length * (numBars * 20 + 24);
  const H = 400, ML = 80, MR = 20, MT = 40, MB = 60;
  const PW = W - ML - MR;
  const PH = H - MT - MB;
  const groupW = PW / groups.length;
  const barW = Math.min(16, groupW / numBars - 2);

  const tickCount = 5;
  const tickStep = maxVal / tickCount;
  const fmtVal = v => {
    if (v >= 1e9) return (v / 1e9).toFixed(1) + "B";
    if (v >= 1e6) return (v / 1e6).toFixed(1) + "M";
    if (v >= 1e3) return (v / 1e3).toFixed(1) + "K";
    return v.toFixed(1);
  };

  let svg = "";
  for (let i = 0; i <= tickCount; i++) {
    const val = i * tickStep;
    const y = MT + PH - (val / maxVal) * PH;
    svg += `<line x1="${ML}" y1="${y}" x2="${W - MR}" y2="${y}" stroke="#eee" stroke-width="1"/>`;
    svg += `<text x="${ML - 6}" y="${y + 4}" text-anchor="end" font-size="10" fill="#666">${fmtVal(val)}</text>`;
  }

  for (let gi = 0; gi < groups.length; gi++) {
    const g = groups[gi];
    const gx = ML + gi * groupW + (groupW - g.bars.length * (barW + 2)) / 2;
    for (let bi = 0; bi < g.bars.length; bi++) {
      const b = g.bars[bi];
      const bx = gx + bi * (barW + 2);
      const bh = (b.value / maxVal) * PH;
      const by = MT + PH - bh;
      let color;
      if (groupBy === "tier") {
        color = JOB_COLORS[b.jobIdx % JOB_COLORS.length];
      } else {
        color = TIER_COLORS[b.tierIdx % TIER_COLORS.length];
      }
      svg += `<rect class="bar-rect" x="${bx}" y="${by}" width="${barW}" height="${bh}" fill="${color}"
        onmouseenter="showBarTip(event,'${escapeHtml(b.job.name || b.job.id)} ${escapeHtml(b.tierLabel)}: ${fmtVal(b.value)} (${fmtVal(b.value * b.value)})')"
        onmouseleave="hideBarTip()"/>`;
    }
  }

  for (let gi = 0; gi < groups.length; gi++) {
    const g = groups[gi];
    const cx = ML + gi * groupW + groupW / 2;
    const label = g.label.length > 8 ? g.label.substring(0, 7) + "…" : g.label;
    svg += `<text class="bar-group-label" x="${cx}" y="${H - MB + 18}">${escapeHtml(label)}</text>`;
  }

  let legendEntries;
  if (groupBy === "tier") {
    legendEntries = visible.map((j, ji) => ({ label: escapeHtml(j.name || j.resourceId || j.id), color: JOB_COLORS[ji % JOB_COLORS.length] }));
  } else {
    const used = new Set();
    const entries = [];
    for (const g of groups) {
      for (const b of g.bars) {
        if (!used.has(b.tierIdx)) {
          used.add(b.tierIdx);
          entries.push({ label: escapeHtml(b.tierLabel), color: TIER_COLORS[b.tierIdx % TIER_COLORS.length] });
        }
      }
    }
    legendEntries = entries;
  }
  const maxNameLen = Math.max(...legendEntries.map(e => e.label.length)) || 1;
  const legendW = maxNameLen * 7 + 26;
  const Lx = ML + PW + 10;
  for (let li = 0; li < legendEntries.length; li++) {
    const e = legendEntries[li];
    const yy = MT + 10 + li * 18;
    svg += `<rect x="${Lx}" y="${yy - 8}" width="10" height="10" fill="${e.color}" rx="2"/>`;
    svg += `<text x="${Lx + 16}" y="${yy}" font-size="11" fill="#444">${e.label}</text>`;
  }
  const W2 = ML + PW + 10 + legendW + MR;

  const chartEl = document.getElementById("dailyGradeChart");
  chartEl.setAttribute("width", Math.max(W2, 300));
  chartEl.innerHTML = svg;
}

function renderElasticityTable(jobs, ranges) {
  const pairs = [];
  for (let i = 0; i < ranges.length - 1; i++) {
    pairs.push({ from: ranges[i].label, to: ranges[i + 1].label, fromIdx: i, toIdx: i + 1 });
  }
  if (!pairs.length) { document.getElementById("elasticityTable").style.display = "none"; return; }

  // Header
  let headHtml = '<tr><th>任务</th>';
  for (const p of pairs) {
    headHtml += `<th>${escapeHtml(p.from)} → ${escapeHtml(p.to)}</th>`;
  }
  headHtml += '</tr>';
  document.getElementById("elasticityHead").innerHTML = headHtml;

  // Body
  const bodyParts = [];
  for (const j of jobs) {
    const name = (j.name || "") + (j.resourceId ? " [" + j.resourceId + "]" : "");
    bodyParts.push(`<tr><td>${escapeHtml(name)}</td>`);
    for (const p of pairs) {
      const vFrom = (j.ranges && j.ranges[p.fromIdx]) ? j.ranges[p.fromIdx].total : 0;
      const vTo = (j.ranges && j.ranges[p.toIdx]) ? j.ranges[p.toIdx].total : 0;
      let ratio = "", cls = "";
      if (vFrom > 0 && vTo > 0) {
        const r = vTo / vFrom;
        ratio = (r * 100).toFixed(1) + "%";
        cls = r >= 1 ? "color:#27ae60;font-weight:700" : "color:#c0392b";
      } else if (vTo > 0 && vFrom === 0) {
        ratio = "∞";
        cls = "color:#27ae60;font-weight:700";
      } else {
        ratio = "—";
      }
      bodyParts.push(`<td class="num" style="${cls}">${ratio}</td>`);
    }
    bodyParts.push('</tr>');
  }
  document.getElementById("elasticityBody").innerHTML = bodyParts.join("");
}

function renderDistributionChart(jobs, ranges) {
  const visible = jobs.filter(j => selectedJobIds.includes(j.id));
  if (!visible.length) { document.getElementById("distChart").innerHTML = ""; return; }
  document.getElementById("distStatLabel").textContent = DIST_STAT_LABELS[_distStat];

  const TIER_COLORS = ["#e74c3c","#e67e22","#f1c40f","#2ecc71","#3498db","#9b59b6","#1abc9c","#34495e"];
  const STAT_LABEL = { med: "中位数", q1: "Q1", last: "末位" };

  const groups = [];
  if (groupBy === "tier") {
    for (let ri = 0; ri < ranges.length; ri++) {
      const label = ranges[ri].label;

        bars.push({ jobIdx: ji, tierIdx: ri, job: j, pct: statVal / avg * 100, tierLabel: label });
      }
      if (bars.length) groups.push({ label, bars, keyIdx: -1 });
    }
  } else {
    for (let ji = 0; ji < visible.length; ji++) {
      const j = visible[ji];
      const name = j.name || j.resourceId || j.id;
      const bars = [];
      for (let ri = 0; ri < ranges.length; ri++) {
        if (!j.ranges || !j.ranges[ri]) continue;
        const r = j.ranges[ri];
        const avg = r.avg;
        if (!avg || avg <= 0) continue;
        const statVal = r[_distStat];
        if (statVal == null || !Number.isFinite(statVal)) continue;
        bars.push({ jobIdx: ji, tierIdx: ri, job: j, pct: statVal / avg * 100, tierLabel: ranges[ri].label });
      }
      if (bars.length) groups.push({ label: name, bars, keyIdx: ji });
    }
  }
  if (!groups.length) { document.getElementById("distChart").innerHTML = ""; return; }

  const allPct = groups.flatMap(g => g.bars.map(b => b.pct));
  const maxPct = Math.max(...allPct) || 1;
  const numBars = Math.max(...groups.map(g => g.bars.length));

  const W = 60 + groups.length * (numBars * 20 + 24);
  const H = 400, ML = 60, MR = 20, MT = 40, MB = 60;
  const PW = W - ML - MR, PH = H - MT - MB;
  const groupW = PW / groups.length;
  const barW = Math.min(16, groupW / numBars - 2);

  function sy(v) { return MT + PH - (v / maxPct) * PH; }
  function fmtLabel(s) { return s.length > 10 ? escapeHtml(s.slice(0, 9)) + "⋯" : escapeHtml(s); }

  let svg = `<g class="chart-axis">`;
  svg += `<line x1="${ML}" y1="${MT}" x2="${ML}" y2="${MT + PH}" stroke="#ccc"/>`;
  for (let i = 0; i <= 5; i++) {
    const v = (maxPct * i / 5), y = sy(v);
    svg += `<line x1="${ML - 4}" y1="${y}" x2="${ML}" y2="${y}" stroke="#ccc"/>`;
    svg += `<text x="${ML - 6}" y="${y + 3}" text-anchor="end">${v.toFixed(1)}%</text>`;
  }
  svg += `<text class="chart-axis-label" x="14" y="${MT + PH / 2}" transform="rotate(-90,14,${MT + PH / 2})">${DIST_STAT_LABELS[_distStat]} / 均值 (%)</text>`;
  svg += `<line x1="${ML}" y1="${MT + PH}" x2="${ML + PW}" y2="${MT + PH}" stroke="#ccc"/>`;

  for (let gi = 0; gi < groups.length; gi++) {
    const g = groups[gi];
    const gx = ML + gi * groupW + groupW / 2;
    svg += `<text class="bar-group-label" x="${gx}" y="${MT + PH + 18}">${fmtLabel(g.label)}</text>`;
    const startX = gx - (g.bars.length * barW + (g.bars.length - 1) * 2) / 2;
    for (let bi = 0; bi < g.bars.length; bi++) {
      const b = g.bars[bi];
      const bx = startX + bi * (barW + 2);
      const bh = Math.max((b.pct / maxPct) * PH, 1);
      const by = sy(b.pct);
      const name = escapeHtml(b.job.name || b.job.resourceId || b.job.id);
      let color;
      if (groupBy === "tier") {
        color = JOB_COLORS[b.jobIdx % JOB_COLORS.length];
      } else {
        color = TIER_COLORS[b.tierIdx % TIER_COLORS.length];
      }
      svg += `<rect class="bar-rect" x="${bx}" y="${by}" width="${barW}" height="${bh}" fill="${color}" opacity=".85"
        onmouseenter="showBarTip(event,'${name}\\n${escapeHtml(b.tierLabel)}\\n${DIST_STAT_LABELS[_distStat]}/均值: ${b.pct.toFixed(1)}%')"
        onmousemove="moveBarTip(event)"
        onmouseleave="hideBarTip()"/>`;
    }
    // group average line
    if (g.bars.length >= 2) {
      const avgVal = g.bars.reduce((s, b) => s + b.pct, 0) / g.bars.length;
      const ay = sy(avgVal);
      const lx2 = startX + g.bars.length * barW + (g.bars.length - 1) * 2;
      svg += `<line x1="${startX}" y1="${ay}" x2="${lx2}" y2="${ay}" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>`;
      svg += `<text x="${lx2 + 4}" y="${ay + 3}" font-size="11" fill="#e74c3c">均: ${avgVal.toFixed(1)}%</text>`;
    }
  }

  // Legend
  let legendW = 0;
  const LEGEND_PAD = 10;
  let legendEntries;
  if (groupBy === "tier") {
    legendEntries = visible.map((j, ji) => ({ label: escapeHtml(j.name || j.resourceId || j.id), color: JOB_COLORS[ji % JOB_COLORS.length] }));
  } else {
    const used = new Set();
    const entries = [];
    for (const g of groups) {
      for (const b of g.bars) {
        if (!used.has(b.tierIdx)) {
          used.add(b.tierIdx);
          entries.push({ label: escapeHtml(b.tierLabel), color: TIER_COLORS[b.tierIdx % TIER_COLORS.length] });
        }
      }
    }
    legendEntries = entries;
  }
  const maxNameLen = Math.max(...legendEntries.map(e => e.label.length)) || 1;
  legendW = maxNameLen * 7 + 26 + LEGEND_PAD;
  const Lx = ML + PW + 10;
  for (let li = 0; li < legendEntries.length; li++) {
    const e = legendEntries[li];
    const yy = MT + 10 + li * 18;
    svg += `<rect x="${Lx}" y="${yy - 8}" width="10" height="10" fill="${e.color}" rx="2"/>`;
    svg += `<text x="${Lx + 16}" y="${yy}" font-size="11" fill="#444">${e.label}</text>`;
  }
  const W2 = ML + PW + 10 + legendW + MR;

  const chartEl = document.getElementById("distChart");
  chartEl.setAttribute("width", W2);
  chartEl.innerHTML = svg;
}
