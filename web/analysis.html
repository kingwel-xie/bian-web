<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>任务分析</title>
<link rel="stylesheet" href="/css888/styles.css?v=20260705" />
<style>
  .page-head { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .page-head .sep { width: 100%; border: none; border-top: 1px solid var(--line); margin: 0; }
  .market-btn { display: inline-flex; align-items: center; justify-content: center; min-height: 34px; border: 1px solid var(--line); border-radius: 6px; background: var(--panel); color: var(--muted); padding: 0 16px; cursor: pointer; font-weight: 700; font-size: 13px; user-select: none; }
  .market-btn:hover { background: #f5f0e8; }
  .market-btn.active { background: #e1f3f6; color: var(--accent-2); border-color: var(--accent-2); }
  .market-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; background: #fffdf8; }
  table { border-collapse: collapse; table-layout: fixed; }
  th, td { border-bottom: 1px solid rgba(46,42,36,0.1); padding: 6px 8px; text-align: left; white-space: nowrap; font-size: 12px; }
  th { position: sticky; top: 0; z-index: 2; background: #eee7d9; color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; user-select: none; }
  .sticky-left { position: sticky; left: 0; z-index: 3; background: #eee7d9; }
  .sticky-left td { background: #fffdf8; }
  .sticky-left th { background: #eee7d9; }
  th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; width: 84px; }
  th.sticky-left, td.sticky-left { width: 72px; }
  th .job-sub { font-size: 12px; font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--muted); display: block; margin-top: 6px; }
  th .job-name { font-size: 14px; font-weight: 700; }
  th .job-start { font-size: 12px; font-weight: 400; color: var(--muted); margin-left: 4px; }
  .job-divider { border-right: 2px solid var(--line-strong); }
  .row-total { font-weight: 700; border-top: 2px solid rgba(46,42,36,0.15); }
  .empty { color: var(--muted); text-align: center; padding: 18px; }
  .total-mode-section { margin-top: 14px; }
  .total-mode-section h3 { margin: 0 0 8px; font-size: 13px; color: var(--accent); }
  .total-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .total-card { border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; background: #fffdf8; }
  .total-card .name { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; }
  .total-card .value { font-size: 14px; font-weight: 700; margin-top: 4px; }
  .total-card .token { font-weight: 400; color: var(--muted); font-size: 12px; }
  .total-card .usd { color: #22a6b3; font-weight: 400; font-size: 11px; }
  .total-card .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .job-selector { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .job-selector button { font-size: 12px; padding: 3px 10px; border: 1px solid var(--line); border-radius: 4px; background: #fff; color: var(--muted); cursor: pointer; white-space: nowrap; }
  .job-selector button.selected { background: #eee7d9; border-color: var(--accent); color: var(--accent); font-weight: 700; }
</style>
</head>
<body>
<main class="shell">
  <div class="page-head">
    <h2 style="margin-bottom:0">任务分析</h2>
    <hr class="sep">
    <div style="display:flex;gap:6px">
      <button class="market-btn active" data-market="spot" id="btnSpot">SPOT</button>
      <button class="market-btn" data-market="um" id="btnUm">UM</button>
    </div>
  </div>

  <div id="jobSelector" class="job-selector" style="display:none"></div>

  <div id="loading" class="empty">加载中...</div>

  <div id="tableSection" style="display:none">
    <div class="table-wrap">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div id="totalModeSection" class="total-mode-section" style="display:none"></div>
  </div>
</main>

<script>
function escapeHtml(v) { return String(v ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function fmtVolume(v) {
  if (!Number.isFinite(v)) return "—";
  if (v >= 1000000000) return (v / 1000000000).toFixed(2) + "B";
  if (v >= 1000000) return (v / 1000000).toFixed(2) + "M";
  if (v >= 1000) return (v / 1000).toFixed(2) + "K";
  return v.toFixed(2);
}

function tierAmountForRange(tiers, label) {
  if (!tiers || !tiers.length) return null;
  const parts = label.split("~").map(Number);
  if (parts.length !== 2) return null;
  const [rmin, rmax] = parts;
  // Try direct match first
  for (const t of tiers) {
    if (t.rankMin === rmin && t.rankMax === rmax) return t.amount;
  }
  // Partial overlap: sum tiers that overlap this range
  const sorted = [...tiers].sort((a, b) => a.rankMin - b.rankMin);
  const gaps = [];
  let cursor = 1;
  for (const t of sorted) {
    if (t.rankMin > cursor) {
      gaps.push({ rankMin: cursor, rankMax: t.rankMin - 1 });
    }
    cursor = t.rankMax + 1;
  }
  const all = [];
  let c = 1;
  for (const t of sorted) {
    if (t.rankMin > c) all.push({ rankMin: c, rankMax: t.rankMin - 1, amount: 0 });
    all.push({ ...t });
    c = t.rankMax + 1;
  }
  // If the range is a gap range (not explicitly a tier), return null
  const isGap = !sorted.some(t => t.rankMin === rmin && t.rankMax === rmax);
  if (isGap) return null;
  return tiers.find(t => t.rankMin === rmin && t.rankMax === rmax)?.amount ?? null;
}

function tierPerPerson(tiers, label) {
  const amt = tierAmountForRange(tiers, label);
  if (amt == null) return null;
  const parts = label.split("~").map(Number);
  if (parts.length !== 2) return null;
  const count = parts[1] - parts[0] + 1;
  return count > 0 ? amt / count : null;
}

let currentMarket = "spot";
let selectedJobIds = null;
let allRankJobs = [];

async function loadAnalysis(market) {
  document.getElementById("loading").style.display = "";
  document.getElementById("tableSection").style.display = "none";
  document.getElementById("tableHead").innerHTML = "";
  document.getElementById("tableBody").innerHTML = "";
  document.getElementById("totalModeSection").style.display = "none";
  document.getElementById("totalModeSection").innerHTML = "";
  document.getElementById("jobSelector").style.display = "none";
  document.getElementById("jobSelector").innerHTML = "";

  try {
    const resp = await fetch("/api/analysis?market=" + encodeURIComponent(market));
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();
    renderAnalysis(data);
  } catch (err) {
    document.getElementById("loading").textContent = "加载失败: " + err.message;
  }
}

function renderAnalysis(data) {
  const rawJobs = data.jobs || [];
  const ranges = data.ranges || [];

  document.getElementById("loading").style.display = "none";

  // Only rank-mode jobs in main table
  allRankJobs = rawJobs.filter(j => j.rewardMode === "rank");
  if (!rawJobs.length) {
    document.getElementById("tableSection").style.display = "";
    document.getElementById("tableBody").innerHTML = '<tr><td colspan="100" class="empty">没有数据。</td></tr>';
    return;
  }
  if (!allRankJobs.length) {
    document.getElementById("tableSection").style.display = "";
    document.getElementById("tableBody").innerHTML = '<tr><td colspan="100" class="empty">没有排名模式的任务。</td></tr>';
    return;
  }

  // Job selector
  selectedJobIds = allRankJobs.map(j => j.id);
  renderJobSelector(allRankJobs, ranges);
  renderTable(allRankJobs, ranges);
}

function renderJobSelector(jobs, ranges) {
  const sel = document.getElementById("jobSelector");
  sel.style.display = "flex";
  const parts = jobs.map((j, i) =>
    `<button class="selected" data-idx="${i}">${escapeHtml(j.name || j.resourceId || j.id)}</button>`
  ).join("");
  sel.innerHTML = parts;
  sel.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = parseInt(btn.dataset.idx);
      const id = jobs[idx].id;
      const pos = selectedJobIds.indexOf(id);
      if (pos >= 0) {
        selectedJobIds.splice(pos, 1);
        btn.classList.remove("selected");
      } else {
        selectedJobIds.push(id);
        btn.classList.add("selected");
      }
      if (selectedJobIds.length === 0) {
        selectedJobIds.push(id);
        btn.classList.add("selected");
        return;
      }
      renderTable(allRankJobs, ranges);
    });
  });
}

function renderTable(jobs, ranges) {
  const visible = jobs.filter(j => selectedJobIds.includes(j.id));
  document.getElementById("tableSection").style.display = "";
  if (!visible.length) {
    document.getElementById("tableBody").innerHTML = '<tr><td colspan="100" class="empty">请至少选择一个任务。</td></tr>';
    return;
  }

  const COLS_PER_JOB = 7;
  const table = document.querySelector("#tableSection table");
  // Remove existing colgroup
  const oldCg = table.querySelector("colgroup");
  if (oldCg) oldCg.remove();
  table.style.width = (72 + visible.length * COLS_PER_JOB * 84) + "px";
  const colgroup = document.createElement("colgroup");
  colgroup.innerHTML = '<col style="width:72px">' + '<col style="width:84px">'.repeat(visible.length * COLS_PER_JOB);
  table.insertBefore(colgroup, table.firstChild);

  // Build header: row 1 (job names), row 2 (sub columns)
  const headHtml = ['<tr><th class="sticky-left" rowspan="2">排名区间</th>'];
  for (let ji = 0; ji < visible.length; ji++) {
    const j = visible[ji];
    const name = (j.name || "") + (j.resourceId ? " [" + j.resourceId + "]" : "");
    const cls = ji < visible.length - 1 ? ' class="job-divider"' : '';
    headHtml.push(`<th colspan="${COLS_PER_JOB}"${cls}><span class="job-name">${escapeHtml(name)}</span>`);
    {
      const s = j.activityStart || "";
      const e = j.activityEnd || "";
      if (s || e) {
        let timeStr = "";
        if (s) timeStr += s;
        if (s && e) timeStr += " ~ ";
        if (e) timeStr += e;
        headHtml.push(`<span class="job-start">${escapeHtml(timeStr)}</span>`);
      }
    }
    if (j.rewardToken) {
      let sub = `奖励: ${escapeHtml(j.rewardToken)}`;
      if (j.rewardPriceUsd != null) {
        const priceStr = j.rewardPriceUsd.toLocaleString("en-US", {minimumFractionDigits:4, maximumFractionDigits:8});
        const tagCls = j.rewardPriceIsLive ? ' style="color:#c0392b;font-weight:700"' : '';
        const tag = j.rewardPriceIsLive ? "实时" : "收盘";
        sub += ` (@ $${priceStr} <span${tagCls}>${tag}</span>)`;
      }
      headHtml.push(`<span class="job-sub">${sub}</span>`);
    }
    headHtml.push('</th>');
  }
  headHtml.push('</tr><tr>');
  for (let ji = 0; ji < visible.length; ji++) {
    const sep = ji < visible.length - 1 ? ' job-divider' : '';
    headHtml.push(`<th class="num">总成交量</th><th class="num">分档占比</th><th class="num">均值</th><th class="num">中位</th><th class="num">Q1</th><th class="num">末位</th><th class="num${sep}">人均奖励</th>`);
  }
  headHtml.push('</tr>');
  document.getElementById("tableHead").innerHTML = headHtml.join("");

  // Build body: one row per range
  const bodyParts = [];
  for (let ri = 0; ri < ranges.length; ri++) {
    const r = ranges[ri];
    const label = r.label;
    bodyParts.push(`<tr><td class="sticky-left">${escapeHtml(label)}</td>`);
    for (let ji = 0; ji < visible.length; ji++) {
      const j = visible[ji];
      const rdata = (j.ranges && j.ranges[ri]) ? j.ranges[ri] : null;
      const total = rdata ? rdata.total : 0;
      const pct = rdata ? rdata.pct : 0;
      const avg = rdata ? rdata.avg : 0;
      const med = rdata ? rdata.med : 0;
      const q1 = rdata ? rdata.q1 : 0;
      const last = rdata ? rdata.last : 0;
      const perPerson = tierPerPerson(j.rewardTiers, label);
      let ppStr = "—";
      if (perPerson != null && perPerson > 0) {
        if (j.rewardPriceUsd != null) {
          ppStr = "$" + (perPerson * j.rewardPriceUsd).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
        } else {
          ppStr = perPerson.toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
        }
      }
      const sep = ji < visible.length - 1 ? ' job-divider' : '';
      bodyParts.push(`<td class="num">${fmtVolume(total)}</td><td class="num">${pct}%</td><td class="num">${fmtVolume(avg)}</td><td class="num">${fmtVolume(med)}</td><td class="num">${fmtVolume(q1)}</td><td class="num">${fmtVolume(last)}</td><td class="num${sep}">${ppStr}</td>`);
    }
    bodyParts.push('</tr>');
  }

  // Total row
  bodyParts.push('<tr class="row-total"><td class="sticky-left">合计</td>');
  for (let ji = 0; ji < visible.length; ji++) {
    const j = visible[ji];
    const sep = ji < visible.length - 1 ? ' job-divider' : '';
    bodyParts.push(`<td class="num">${fmtVolume(j.totalVolume)}</td><td class="num">100%</td><td class="num">—</td><td class="num">—</td><td class="num">—</td><td class="num">—</td><td class="num${sep}">—</td>`);
  }
  bodyParts.push('</tr>');

  document.getElementById("tableBody").innerHTML = bodyParts.join("");
}

document.getElementById("btnSpot").addEventListener("click", () => {
  document.querySelectorAll(".market-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("btnSpot").classList.add("active");
  currentMarket = "spot";
  loadAnalysis("spot");
});

document.getElementById("btnUm").addEventListener("click", () => {
  document.querySelectorAll(".market-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("btnUm").classList.add("active");
  currentMarket = "um";
  loadAnalysis("um");
});

loadAnalysis("spot");
</script>
</body>
</html>
