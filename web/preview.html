<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>排行榜预览</title>
<link rel="stylesheet" href="/css888/styles.css?v=20260621f" />
<style>
  body { padding: 14px; }
  .preview-head { display: flex; justify-content: space-between; gap: 14px; align-items: flex-start; margin-bottom: 12px; flex-wrap: wrap; }
  .preview-head p { color: var(--muted); font-size: 12px; margin-top: 5px; }
  .preview-meta { color: var(--muted); font-size: 12px; }
  .preview-body { display: flex; gap: 12px; margin-bottom: 10px; align-items: flex-start; }
  .stats-panel { flex: 0 0 340px; border: 1px solid var(--line); border-radius: 8px; background: #fffdf8; overflow: hidden; }
  .stats-panel h3 { margin: 0; padding: 10px 12px; font-size: 13px; background: #eee7d9; color: var(--accent); }
  .stats-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .stats-table th, .stats-table td { padding: 7px 10px; font-size: 12px; border-bottom: 1px solid rgba(46,42,36,0.08); }
  .stats-table th { background: transparent; color: var(--muted); font-weight: 700; position: static; text-transform: none; }
  .stats-table td.num { font-variant-numeric: tabular-nums; }
  .chart-panel { flex: 1; min-width: 0; }
  .delta-charts { display: grid; gap: 8px; }
  .delta-charts:empty { display: none; }
  .delta-charts figure { min-width: 0; margin: 0; border: 1px solid var(--line); border-radius: 8px; background: #fffdf8; overflow: hidden; }
  .delta-charts img { display: block; width: 100%; max-height: 760px; object-fit: contain; background: #fffdf8; }
  .delta-charts figcaption { border-top: 1px solid var(--line); padding: 6px 8px; color: var(--muted); font-size: 12px; }
  table { width: 100%; min-width: 760px; border-collapse: collapse; table-layout: fixed; }
  th, td { border-bottom: 1px solid rgba(46,42,36,0.1); padding: 10px 12px; text-align: left; white-space: nowrap; font-size: 13px; }
  th { position: sticky; top: 0; z-index: 1; background: #eee7d9; color: var(--accent); font-size: 12px; text-transform: uppercase; }
  .col-rank { width: 56px; } .col-nick { width: 130px; } .col-user { width: 110px; }
  .col-score { width: 100px; } .col-volume { width: 150px; } .col-delta { width: 130px; } .col-region { width: 80px; }
  .rank { color: var(--accent-2); font-weight: 900; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .downloads { display: flex; flex-wrap: wrap; gap: 8px; }
  .downloads a { display: inline-flex; align-items: center; justify-content: center; min-height: 34px; border: 1px solid var(--line); border-radius: 999px; background: #eee7d9; color: var(--ink); padding: 0 16px; cursor: pointer; font-weight: 900; font-size: 12px; text-decoration: none; }
  .downloads a:hover { background: #e1f3f6; color: var(--accent-2); }
  .err { color: var(--bad); font-weight: 900; }
  .empty { color: var(--muted); text-align: center; padding: 18px; }
  #searchInput { height: 34px; border: 1px solid var(--line); border-radius: 8px; background: #fffdf8; color: var(--ink); padding: 0 12px; outline: none; font: inherit; font-size: 12px; }
</style>
</head>
<body>
  <div class="panel" style="padding:14px">
    <div class="preview-head">
      <div>
        <h2 style="font-size:18px;margin:0" id="title">排行榜预览</h2>
        <p class="preview-meta" id="meta">加载中...</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input id="searchInput" placeholder="搜索昵称" />
        <div class="downloads" id="downloadLinks"></div>
      </div>
    </div>
    <div class="preview-body">
      <div class="stats-panel">
        <h3>基础统计</h3>
        <table class="stats-table">
          <thead><tr><th>排名</th><th>人数</th><th>总成交量</th><th>均值</th></tr></thead>
          <tbody id="statsBody"></tbody>
        </table>
      </div>
      <div class="chart-panel">
        <div id="deltaCharts" class="delta-charts"></div>
      </div>
    </div>
    <div class="table-wrap" style="max-height:calc(100vh - 180px);overflow:auto;border:1px solid var(--line);border-radius:8px;background:#fffdf8">
      <table>
        <colgroup><col class="col-rank" /><col class="col-nick" /><col class="col-user" /><col class="col-score" /><col class="col-volume" /><col class="col-delta" /><col class="col-region" /></colgroup>
        <thead><tr><th>#</th><th>Nickname</th><th>User ID</th><th>分数</th><th>真实成交量</th><th>增量</th><th>Region</th></tr></thead>
        <tbody id="rows"><tr><td colspan="7" class="empty">加载中...</td></tr></tbody>
      </table>
    </div>
  </div>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const jobId = params.get("job");
  if (!jobId) { document.getElementById("meta").textContent = "缺少 job 参数。"; return; }

  function escapeHtml(v) { return String(v ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function fmtNumber(v) { const n = Number(v); return Number.isFinite(n) ? n.toLocaleString("en-US", { maximumFractionDigits: 2 }) : "—"; }

  try {
    const resp = await fetch("/api/jobs/" + encodeURIComponent(jobId) + "/preview");
    const preview = await resp.json();
    if (!resp.ok || preview.error) throw new Error(preview.error || "加载失败");

    const allRows = preview.rows || [];
    const updated = preview.meta?.updatedTime ? new Date(Number(preview.meta.updatedTime)).toLocaleString("zh-CN", { hour12: false }) : "—";
    const restoredSum = preview.restoredTradingVolumeSum ? ` · restored ${fmtNumber(preview.restoredTradingVolumeSum)}` : "";
    const marketSymbol = [preview.market, preview.symbol].filter(Boolean).join(" ");
    const heading = marketSymbol || preview.name || "排行榜预览";
    document.title = heading + " — 排行榜预览";
    document.getElementById("title").textContent = heading;
    document.getElementById("meta").textContent = `${preview.count || allRows.length || 0} 行 · resourceId ${preview.resourceId || "—"}${restoredSum} · updated ${updated}`;

    document.getElementById("downloadLinks").innerHTML = [
      preview.xlsxUrl ? `<a href="${escapeHtml(preview.xlsxUrl)}">下载 XLSX</a>` : "",
      preview.csvUrl ? `<a href="${escapeHtml(preview.csvUrl)}">下载 CSV</a>` : "",
      preview.jsonUrl ? `<a href="${escapeHtml(preview.jsonUrl)}">查看 JSON</a>` : "",
      preview.discoveryUrl ? `<a href="${escapeHtml(preview.discoveryUrl)}">Discovery</a>` : "",
    ].filter(Boolean).join("");

    function rangeStats(rows, ranges) {
      return ranges.map(([label, min, max]) => {
        const items = rows.filter(r => { const k = Number(r.rank); return k >= min && k <= max; });
        const count = items.length;
        const total = items.reduce((s, r) => s + (Number(r.restoredTradingVolume) || 0), 0);
        const avg = count ? total / count : 0;
        return { label, count, total, avg };
      });
    }

    function fmtVolume(v) {
      if (!Number.isFinite(v)) return "—";
      if (v >= 100000000) return (v / 100000000).toFixed(2) + "B";
      if (v >= 10000) return (v / 10000).toFixed(2) + "w";
      return v.toFixed(2);
    }

    const ranges = [
      ["1~5", 1, 5],
      ["6~20", 6, 20],
      ["21~50", 21, 50],
      ["51~200", 51, 200],
      ["201~1000", 201, 1000],
    ];
    const stats = rangeStats(allRows, ranges);
    document.getElementById("statsBody").innerHTML = stats.map(s => `
      <tr><td>${escapeHtml(s.label)}</td><td class="num">${s.count}</td><td class="num">${fmtVolume(s.total)}</td><td class="num">${fmtVolume(s.avg)}</td></tr>
    `).join("");

    document.getElementById("deltaCharts").innerHTML = preview.delta?.combinedChartUrl ? `
      <figure><img src="${escapeHtml(preview.delta.combinedChartUrl)}" alt="增量图" loading="lazy" />
      <figcaption>增量图 · 10-25 / 26-50 / 180-200</figcaption></figure>` : "";

    function render(query) {
      const q = query.trim().toLowerCase();
      const rows = q ? allRows.filter(r => String(r.nickname || "").toLowerCase().includes(q)) : allRows;
      document.getElementById("rows").innerHTML = rows.length ? rows.map(r => `
        <tr><td class="rank">${escapeHtml(r.rank)}</td>
        <td>${escapeHtml(r.nickname || "—")}</td>
        <td>${escapeHtml(r.userId || "—")}</td>
        <td class="num">${fmtNumber(r.grade)}</td>
        <td class="num">${fmtNumber(r.restoredTradingVolume || r.tradingVolume)}</td>
        <td class="num">${r.deltaRestoredTradingVolume == null ? "—" : fmtNumber(r.deltaRestoredTradingVolume)}</td>
        <td>${escapeHtml(r.region || "—")}</td></tr>
      `).join("") : `<tr><td colspan="7" class="empty">${q ? "没有匹配昵称。" : "没有数据。"}</td></tr>`;
    }
    render("");

    document.getElementById("searchInput").addEventListener("input", e => render(e.target.value));
  } catch (err) {
    document.getElementById("meta").textContent = err.message;
  }
})();
</script>
</body>
</html>
