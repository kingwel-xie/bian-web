<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>团队检测</title>
<link rel="stylesheet" href="/css888/styles.css?v=20260704b" />
<style>
  body { padding: 10px; }
  .team-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 6px; }
  .team-head h2 { font-size: 16px; margin: 0; }
  .team-head a { font-size: 12px; color: var(--accent-2); }
  .preview-meta { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
  .params-panel { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; margin-bottom: 8px; padding: 8px 12px; border: 1px solid var(--line); border-radius: 6px; background: #fffdf8; }
  .params-panel label { font-size: 11px; color: var(--muted); display: flex; flex-direction: column; gap: 2px; }
  .params-panel input, .params-panel select { border: 1px solid var(--line); border-radius: 4px; padding: 2px 6px; font: inherit; font-size: 12px; background: #fff; color: var(--ink); }
  .params-panel select { width: 190px; }
  .params-panel input { width: 64px; }
  .params-panel button { min-height: 28px; border: 1px solid var(--line); border-radius: 999px; background: #eee7d9; color: var(--ink); padding: 0 16px; cursor: pointer; font-weight: 900; font-size: 11px; }
  .params-panel button:hover { background: #e1f3f6; color: var(--accent-2); }
  .params-panel button:disabled { opacity: 0.5; cursor: default; }
  .team-panel { border: 1px solid var(--line); border-radius: 6px; background: #fffdf8; overflow: hidden; }
  .team-panel h3 { margin: 0; padding: 6px 12px; font-size: 12px; background: #eee7d9; color: var(--accent); display: flex; justify-content: space-between; align-items: center; }
  .team-card { border-top: 1px solid var(--line); padding: 6px 12px; }
  .team-card-header { display: flex; gap: 12px; font-size: 11px; color: var(--muted); margin-bottom: 4px; flex-wrap: wrap; }
  .team-card-header b { color: var(--ink); }
  .team-members { width: 100%; table-layout: fixed; border-collapse: collapse; font-size: 11px; }
  .team-members th, .team-members td { padding: 2px 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-members th { font-size: 10px; color: var(--muted); background: transparent; position: static; text-transform: none; }
  .team-members th:nth-child(1), .team-members td:nth-child(1) { width: 24px; text-align: center; }
  .team-members th:nth-child(2), .team-members td:nth-child(2) { width: 18%; }
  .team-members th:nth-child(3), .team-members td:nth-child(3) { width: 24%; }
  .team-members .num { text-align: right; }
  .team-empty { color: var(--muted); text-align: center; padding: 14px; font-size: 12px; }
  .team-tag { font-size: 10px; color: #fff; font-weight: 700; margin-left: 3px; vertical-align: super; background: #4a7c8c; padding: 1px 5px; border-radius: 4px; line-height: 1.4; }
  .err { color: var(--bad); font-weight: 900; }
  .team-name-input { padding: 1px 5px !important; font-size: 11px !important; }
  .mode-tabs { display: flex; gap: 0; margin-bottom: 8px; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .mode-tab { flex: 1; padding: 6px 0; border: 0; background: #fffdf8; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 600; text-align: center; }
  .mode-tab.active { background: #eee7d9; color: var(--accent); }
  .mode-tab:not(:last-child) { border-right: 1px solid var(--line); }
  .mode-tab:hover { background: #e1f3f6; color: var(--accent-2); }
  .job-list-panel { border: 1px solid var(--line); border-radius: 4px; padding: 2px; background: #fff; max-height: 140px; overflow-y: auto; font-size: 11px; display: flex; flex-wrap: wrap; gap: 2px; align-items: flex-start; }
  .job-btn { padding: 2px 8px; border: 1px solid var(--line); border-radius: 4px; background: #f9f7f4; cursor: pointer; font-size: 10px; line-height: 1.6; color: var(--ink); white-space: nowrap; }
  .job-btn:hover { background: #e1f3f6; }
  .job-btn.selected { background: #4a7c8c; color: #fff; border-color: #4a7c8c; }
  @media (max-width: 640px) {
    body { padding: 6px; }
    .panel[style] { padding: 6px !important; }
    .params-panel { flex-direction: column; align-items: stretch; }
    .params-panel input { width: 100%; box-sizing: border-box; }
    .team-card-header { flex-direction: column; gap: 4px; }
  }
</style>
</head>
<body>
<div class="panel" style="padding:14px">
  <div class="team-head">
    <h2>团队检测</h2>
    <a id="backLink" href="">← 返回预览</a>
  </div>
  <div id="meta" class="preview-meta">加载中...</div>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="snap">📸 快照检测</button>
    <button class="mode-tab" data-mode="cross">🔗 跨任务检测</button>
  </div>

  <div id="snapPanel" class="params-panel">
    <label>快照1（旧）<select id="paramSnap1"></select></label>
    <label>快照2（新）<select id="paramSnap2"></select></label>
    <label>排名差距 <input type="number" id="paramMaxRankGap" value="20" min="1" /></label>
    <label>分析人数 <input type="number" id="paramTopN" value="500" min="50" /></label>
    <label>增量容差 <input type="number" id="paramDeltaErr" value="1000" min="0" step="100" /></label>
    <label>忽略小增量 <input type="number" id="paramMinDelta" value="500" min="0" step="100" /></label>
    <button id="teamBtn" type="button" onclick="runTeamAnalysis()">📊 开始检测</button>
  </div>

  <div id="crossPanel" class="params-panel" style="display:none">
    <label>分析人数 <input type="number" id="crossTopN" value="200" min="50" /></label>
    <label>跳过前 <input type="number" id="crossSkipTop" value="50" min="0" /></label>
    <label>排名差距 <input type="number" id="crossMaxRankGap" value="20" min="1" /></label>
    <label>grade容差 <input type="number" id="crossGradeErr" value="0.5" min="0.1" step="0.1" /></label>
    <label>最少共同任务 <input type="number" id="crossMinShared" value="2" min="1" /></label>
    <label style="flex:1;min-width:200px">SPOT已完成任务
      <div id="crossJobList" class="job-list-panel">加载中...</div>
    </label>
    <button id="crossBtn" type="button">🚀 跨任务检测</button>
  </div>

  <div id="teamPanel" class="team-panel" style="display:none">
    <h3>检测结果 <span id="teamSummary" style="font-weight:400;font-size:12px"></span></h3>
    <div id="teamBody"></div>
  </div>
</div>
<script>
function escapeHtml(v) { return String(v ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtNumber(v) { const n = Number(v); return Number.isFinite(n) ? n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : "—"; }
function fmtSnapshotTs(ts) {
  if (!ts) return "";
  let t = ts.replace(/[^0-9T:\-]/g, "");
  if (t.length >= 15) t = t.slice(0, 15) + ":" + t.slice(15);
  if (t.length >= 13) t = t.slice(0, 13) + ":" + t.slice(13);
  return t.replace("T", " ");
}

var lastTeams = null;
var dbExists = false;
var teamMap = {}; // nickname → team name from DB
var _allCompletedJobs = []; // cached for cross-job detection

function populateSnapshotSelects(snapshots) {
  const sel1 = document.getElementById("paramSnap1");
  const sel2 = document.getElementById("paramSnap2");
  sel1.innerHTML = "";
  sel2.innerHTML = "";
  snapshots.forEach((s, i) => {
    const label = fmtSnapshotTs(s.timestamp) || "快照 " + (i + 1);
    sel1.appendChild(new Option(label, s.timestamp));
    sel2.appendChild(new Option(label, s.timestamp));
  });
  if (snapshots.length >= 2) {
    sel1.selectedIndex = snapshots.length - 2;
    sel2.selectedIndex = snapshots.length - 1;
  }
}

function saveOneTeam(idx) {
  if (!lastTeams || !lastTeams[idx]) return;
  const input = document.getElementById("teamName-" + idx);
  const name = (input?.value || "").trim() || "团队 " + (idx + 1);
  const btn = document.getElementById("saveBtn-" + idx);
  const msgEl = document.getElementById("saveMsg-" + idx);
  btn.disabled = true;
  const method = dbExists ? "PUT" : "POST";
  fetch("/api/teams", {
    method: method,
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({teams: [{name: name, members: lastTeams[idx].members}]}),
  }).then(r => {
    if (!r.ok) return r.json().then(d => { throw new Error(d.error || "保存失败"); });
    return r.json();
  }).then(data => {
    dbExists = true;
    msgEl.textContent = "✓ 已添加";
    msgEl.style.color = "var(--good)";
    btn.textContent = "✓ 已添加";
    btn.disabled = true;
  }).catch(err => {
    msgEl.textContent = "✗ " + err.message;
    msgEl.style.color = "var(--bad)";
    btn.disabled = false;
  });
}

function loadTeams() {
  fetch("/api/teams").then(r => r.json()).then(data => {
    const tlist = (data.db && data.db.teams) || [];
    dbExists = tlist.length > 0;
    teamMap = {};
    for (const t of tlist) {
      for (const m of (t.members || [])) {
        if (m.nickname) teamMap[m.nickname] = t.name;
      }
    }
  }).catch(() => {});
}

const params = new URLSearchParams(location.search);
const jobId = params.get("job");
if (!jobId) {
  document.getElementById("meta").textContent = "缺少 job 参数。";
  document.getElementById("backLink").href = "preview.html";
} else {
  document.getElementById("meta").textContent = "任务 " + jobId;
  document.getElementById("backLink").href = "preview.html?job=" + encodeURIComponent(jobId);

  fetch("/api/jobs/" + encodeURIComponent(jobId) + "/preview")
    .then(r => r.json())
    .then(preview => {
      const heading = preview.taskName || [preview.market, preview.token || preview.symbol].filter(Boolean).join(" ") || preview.name || "";
      if (heading) document.getElementById("meta").textContent = heading;
      document.title = (heading || "团队检测") + " — 团队检测";
      const snaps = preview.snapshots || [];
      populateSnapshotSelects(snaps);
    })
    .catch(() => {});
}

loadTeams();

// Mode tabs
document.querySelectorAll(".mode-tab").forEach(tab => {
  tab.addEventListener("click", function() {
    document.querySelectorAll(".mode-tab").forEach(t => t.classList.remove("active"));
    this.classList.add("active");
    const mode = this.dataset.mode;
    document.getElementById("snapPanel").style.display = mode === "snap" ? "" : "none";
    document.getElementById("crossPanel").style.display = mode === "cross" ? "" : "none";
  });
});

// Load all completed SPOT jobs for cross-job detection
function loadCrossJobList() {
  const container = document.getElementById("crossJobList");
  container.innerHTML = "加载中...";
  fetch("/api/jobs?per_page=500")
    .then(r => r.json())
    .then(data => {
      const jobs = (data.jobs || []).filter(j =>
        j.status === "completed" && (j.payload || {}).market === "spot"
      );
      _allCompletedJobs = jobs;
      if (!jobs.length) {
        container.innerHTML = '<span style="color:var(--muted)">无已完成 SPOT 任务</span>';
        return;
      }
      container.innerHTML = jobs.map(j =>
        `<button class="job-btn selected" data-jid="${j.id}">${escapeHtml(j.name || j.id)}</button>`
      ).join("");
      container.querySelectorAll(".job-btn").forEach(btn => {
        btn.addEventListener("click", function() {
          this.classList.toggle("selected");
        });
      });
    })
    .catch(() => { container.innerHTML = '<span style="color:var(--bad)">加载失败</span>'; });
}
loadCrossJobList();

function runCrossTeamAnalysis() {
  const btn = document.getElementById("crossBtn");
  btn.disabled = true;
  btn.textContent = "⏳ 分析中...";

  const selected = Array.from(document.querySelectorAll(".job-btn.selected")).map(btn => btn.dataset.jid);
  if (!selected.length) {
    btn.disabled = false; btn.textContent = "🚀 跨任务检测";
    document.getElementById("teamSummary").textContent = "请至少选择一个任务";
    document.getElementById("teamPanel").style.display = "";
    return;
  }

  const topN = document.getElementById("crossTopN").value;
  const skipTop = document.getElementById("crossSkipTop").value;
  const maxRankGap = document.getElementById("crossMaxRankGap").value;
  const gradeErr = document.getElementById("crossGradeErr").value;
  const minShared = document.getElementById("crossMinShared").value;

  const q = "?job_ids=" + encodeURIComponent(selected.join(","))
    + "&market=spot"
    + "&top_n=" + encodeURIComponent(topN)
    + "&skip_top=" + encodeURIComponent(skipTop)
    + "&max_rank_gap=" + encodeURIComponent(maxRankGap)
    + "&grade_err=" + encodeURIComponent(gradeErr)
    + "&min_shared_jobs=" + encodeURIComponent(minShared);

  const teamPanel = document.getElementById("teamPanel");
  const teamBody = document.getElementById("teamBody");
  const teamSummary = document.getElementById("teamSummary");

  fetch("/api/jobs/team-analysis-cross" + q)
    .then(r => {
      if (!r.ok) return r.text().then(t => { throw new Error("HTTP " + r.status + ": " + t.slice(0, 200)); });
      return r.json();
    })
    .then(data => {
      btn.disabled = false;
      btn.textContent = "🚀 跨任务检测";
      if (data.error) { teamSummary.textContent = "错误: " + data.error; teamPanel.style.display = ""; return; }
      const teams = data.teams || [];
      lastTeams = teams;
      teamSummary.textContent = (data.params ? "共 " + data.params.totalUsers + " 人参与分析，": "") + (teams.length ? "发现 " + teams.length + " 个团队" : "未检测到团队");

      teamBody.innerHTML = teams.length ? teams.map((t, idx) => {
        // collect all unique job names from members
        const allJobs = [];
        const seen = {};
        for (const m of t.members) {
          for (const j of (m.jobs || [])) {
            if (!seen[j.jobId]) { seen[j.jobId] = true; allJobs.push(j); }
          }
        }
        allJobs.sort((a, b) => a.jobName.localeCompare(b.jobName));
        const jobHeaders = allJobs.map((j, ji) =>
          `<th class="num">${escapeHtml(j.jobName)}<br><span style="font-weight:400">排名</span></th>` +
          `<th class="num"><span style="font-weight:400">grade</span></th>`
        ).join("");

        return `<div class="team-card">
          <div class="team-card-header">
            <span>团队 #${t.id + 1} · <b>${t.size}</b> 人</span>
            <span>平均排名 <b>${t.avgRank}</b></span>
          </div>
          <table class="team-members">
            <tr><th>#</th><th>昵称</th><th>User ID</th>${jobHeaders}</tr>
            ${t.members.map((m, i) => {
              const jobMap = {};
              for (const j of (m.jobs || [])) jobMap[j.jobId] = j;
              return `<tr>
                <td>${i + 1}</td>
                <td>${escapeHtml(m.nickname)}${teamMap[m.nickname] ? `<sup class="team-tag">${escapeHtml(teamMap[m.nickname])}</sup>` : ""}</td>
                <td>${escapeHtml(m.userId)}</td>
                ${allJobs.map(j => {
                  const jd = jobMap[j.jobId];
                  return jd ? `<td class="num">${jd.rank}</td><td class="num">${fmtNumber(jd.grade)}</td>` : `<td class="num">—</td><td class="num">—</td>`;
                }).join("")}
              </tr>`;
            }).join("")}
          </table>
          <div style="padding:8px 16px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px">名称 <input id="teamName-${idx}" class="team-name-input" type="text" placeholder="团队 ${idx + 1}" style="border:1px solid var(--line);border-radius:4px;padding:4px 6px;font:inherit;font-size:12px;width:140px" /></label>
            <button id="saveBtn-${idx}" class="team-add-btn" type="button" onclick="saveOneTeam(${idx})">+ 添加到数据库</button>
            <span id="saveMsg-${idx}" style="font-size:12px"></span>
          </div>
        </div>`;
      }).join("") : '<div class="team-empty">未检测到团队。</div>';

      teamPanel.style.display = "";
    })
    .catch(err => {
      btn.disabled = false;
      btn.textContent = "🚀 跨任务检测";
      teamSummary.textContent = "请求失败";
      teamBody.innerHTML = '<div class="team-empty">错误: ' + escapeHtml(err.message) + '</div>';
      teamPanel.style.display = "";
    });
}

document.getElementById("crossBtn").addEventListener("click", runCrossTeamAnalysis);

function runTeamAnalysis() {
  const btn = document.getElementById("teamBtn");
  btn.disabled = true;
  btn.textContent = "⏳ 分析中...";
  if (!jobId) return;

  const snap1 = document.getElementById("paramSnap1").value;
  const snap2 = document.getElementById("paramSnap2").value;
  const maxRankGap = document.getElementById("paramMaxRankGap").value;
  const topN = document.getElementById("paramTopN").value;
  const deltaErr = document.getElementById("paramDeltaErr").value;
  const minDelta = document.getElementById("paramMinDelta").value;
  const q = "?snapshot1=" + encodeURIComponent(snap1) + "&snapshot2=" + encodeURIComponent(snap2) + "&max_rank_gap=" + encodeURIComponent(maxRankGap) + "&top_n=" + encodeURIComponent(topN) + "&delta_err=" + encodeURIComponent(deltaErr) + "&min_delta=" + encodeURIComponent(minDelta);

  const teamPanel = document.getElementById("teamPanel");
  const teamBody = document.getElementById("teamBody");
  const teamSummary = document.getElementById("teamSummary");

  fetch("/api/jobs/" + encodeURIComponent(jobId) + "/team-analysis" + q)
    .then(r => {
      if (!r.ok) return r.text().then(t => { throw new Error("HTTP " + r.status + ": " + t.slice(0, 200)); });
      return r.json();
    })
    .then(data => {
      btn.disabled = false;
      btn.textContent = "📊 开始检测";
      if (data.error) { teamSummary.textContent = "错误: " + data.error; teamPanel.style.display = ""; return; }
      const teams = data.teams || [];
      lastTeams = teams;
      teamSummary.textContent = teams.length ? "发现 " + teams.length + " 个团队" : "未检测到团队";

      teamBody.innerHTML = teams.length ? teams.map((t, idx) => {
        const snapHeaders = t.members[0]?.history?.map((h, si) =>
          `<th class="num">快照${si + 1}<br><span style="font-weight:400">排名</span></th>` +
          `<th class="num"><span style="font-weight:400">grade</span></th>` +
          `<th class="num"><span style="font-weight:400">增量</span></th>`
        ).join("") || "";
        return `<div class="team-card">
          <div class="team-card-header">
            <span>团队 #${t.id + 1} · <b>${t.size}</b> 人</span>
            <span>平均排名 <b>${t.avgRank}</b></span>
          </div>
          <table class="team-members">
            <tr><th>#</th><th>昵称</th><th>User ID</th>${snapHeaders}</tr>
            ${t.members.map((m, i) => `<tr>
              <td>${i + 1}</td>
              <td>${escapeHtml(m.nickname)}${teamMap[m.nickname] ? `<sup class="team-tag">${escapeHtml(teamMap[m.nickname])}</sup>` : ""}</td>
              <td>${escapeHtml(m.userId)}</td>
              ${(m.history || []).map(h =>
                `<td class="num">${h.rank}</td><td class="num">${fmtNumber(h.grade)}</td><td class="num">${h.delta != null ? fmtNumber(h.delta) : "—"}</td>`
              ).join("")}
            </tr>`).join("")}
          </table>
          <div style="padding:8px 16px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px">名称 <input id="teamName-${idx}" class="team-name-input" type="text" placeholder="团队 ${idx + 1}" style="border:1px solid var(--line);border-radius:4px;padding:4px 6px;font:inherit;font-size:12px;width:140px" /></label>
            <button id="saveBtn-${idx}" class="team-add-btn" type="button" onclick="saveOneTeam(${idx})">+ 添加到数据库</button>
            <span id="saveMsg-${idx}" style="font-size:12px"></span>
          </div>
        </div>`;
      }).join("") : '<div class="team-empty">未检测到团队。</div>';

      teamPanel.style.display = "";
    })
    .catch(err => {
      btn.disabled = false;
      btn.textContent = "📊 开始检测";
      teamSummary.textContent = "请求失败";
      teamBody.innerHTML = '<div class="team-empty">错误: ' + escapeHtml(err.message) + '</div>';
      teamPanel.style.display = "";
    });
}
</script>
</body>
</html>
