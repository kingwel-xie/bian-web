<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>币安最新活动</title>
<link rel="stylesheet" href="/css888/styles.css?v=20260708" />
<style>
  .act-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .act-head h2 { margin: 0; font-size: 18px; }
  .act-head .act-actions { display: flex; align-items: center; gap: 8px; }
  .act-head input { border: 1px solid var(--line); border-radius: 6px; padding: 6px 12px; font-size: 13px; background: var(--panel); width: 240px; }
  .act-head input:focus { outline: none; border-color: var(--accent-2); }
  .act-refresh { font-size: 12px; padding: 5px 14px; border: 1px solid var(--line); border-radius: 6px; background: var(--panel); color: var(--accent); cursor: pointer; font-weight: 700; white-space: nowrap; position: relative; }
  .act-refresh:hover { background: #f5f0e8; }
  .act-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
  .act-refresh .badge { position: absolute; top: -6px; right: -6px; background: #c44; color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; line-height: 1.4; pointer-events: none; }
  .act-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 10px; }
  .act-card { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .act-card .act-meta { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
  .act-card .act-title { font-size: 12px; font-weight: 700; color: var(--accent); line-height: 1.5; }
  .act-card .act-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .act-card .act-tags .tag { font-size: 10px; padding: 1px 7px; border-radius: 4px; font-weight: 600; line-height: 1.6; background: color-mix(in srgb, var(--accent) 12%, var(--panel)); color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent); white-space: nowrap; }
  .act-card .act-tags .tag.type { background: var(--tag-bg, #eee); color: var(--tag-fg, #333); border-color: var(--tag-border, transparent); }
  .act-filters { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
  .act-filters .flt { font-size: 11px; padding: 2px 10px; border-radius: 5px; font-weight: 600; cursor: pointer; line-height: 1.7; border: 1px solid; user-select: none; transition: .12s; opacity: .65; }
  .act-filters .flt:hover { opacity: 1; }
  .act-filters .flt.on { opacity: 1; background: var(--flt-bg, #eee); color: var(--flt-fg, #333); border-color: var(--flt-border, transparent); }
  .act-filters .flt.ex { opacity: .45; }
  .act-card .act-links { display: flex; gap: 6px; }
  .act-card .act-link { font-size: 11px; color: var(--accent-2); text-decoration: none; border: 1px solid var(--accent-2); border-radius: 4px; padding: 3px 10px; font-weight: 700; white-space: nowrap; }
  .act-card .act-link:hover { background: var(--accent-2); color: #fff; }
  .act-card.act-new { border-color: var(--accent-2); background: color-mix(in srgb, var(--accent-2) 6%, var(--panel)); }
  .act-empty { color: var(--muted); text-align: center; padding: 40px 0; font-size: 13px; }
  .act-error { color: #b34a4a; text-align: center; padding: 24px; font-size: 13px; }
  .act-loading { color: var(--muted); text-align: center; padding: 24px; font-size: 13px; }
  .act-count { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<main class="shell">
  <div class="act-head">
    <h2>币安最新活动</h2>
    <div class="act-actions">
      <input id="searchInput" type="text" placeholder="搜索活动标题…" />
      <button id="refreshBtn" class="act-refresh">🔄 刷新</button>
    </div>
  </div>
  <div class="act-filters" id="filters"></div>
  <div class="act-count" id="count">加载中...</div>
  <div id="grid" class="act-grid"></div>
</main>

<script>
(async () => {
  const grid = document.getElementById("grid");
  const count = document.getElementById("count");
  const searchInput = document.getElementById("searchInput");
  const refreshBtn = document.getElementById("refreshBtn");

  let articles = [];
  let newIds = new Set();
  let lastCheck = 0;
  let pollTimer = null;
  let excludedTypes = new Set();
  let allTypes = [];

  function fmtDate(ts) {
    const d = new Date(ts);
    return d.toLocaleString("zh-CN", { hour12: false, timeZone: "Asia/Shanghai" });
  }

  function badge(n) {
    const existing = refreshBtn.querySelector(".badge");
    if (n > 0) {
      if (existing) existing.textContent = n;
      else refreshBtn.insertAdjacentHTML("beforeend", `<span class="badge">${n}</span>`);
    } else if (existing) {
      existing.remove();
    }
  }

  function renderFilters() {
    if (!allTypes.length) { document.getElementById("filters").innerHTML = ""; return; }
    document.getElementById("filters").innerHTML = allTypes.map(t => {
      const excluded = excludedTypes.has(t);
      const h = tagHue(t);
      const style = excluded
        ? `color:#888;border-color:#888;text-decoration:line-through`
        : `--flt-bg:${tagBg(h)};--flt-fg:${tagFg(h)};--flt-border:${tagBorder(h)}`;
      return `<span class="flt${excluded ? " ex" : " on"}" style="${style}" data-type="${escapeHtml(t)}">${escapeHtml(t)}</span>`;
    }).join("");
    document.getElementById("filters").querySelectorAll(".flt").forEach(el => {
      el.addEventListener("click", () => {
        const t = el.dataset.type;
        if (excludedTypes.has(t)) excludedTypes.delete(t); else excludedTypes.add(t);
        render();
      });
    });
  }

  function render() {
    const q = searchInput.value.trim().toLowerCase();
    let filtered = articles;
    if (q) filtered = filtered.filter(a => a.title.toLowerCase().includes(q));
    if (excludedTypes.size) filtered = filtered.filter(a => {
      if (!a.tags || Array.isArray(a.tags) || !a.tags.types) return true;
      return !a.tags.types.some(t => excludedTypes.has(t));
    });
    renderFilters();
    if (!filtered.length) {
      grid.innerHTML = `<div class="act-empty">${q || excludedTypes.size ? "没有匹配的活动。" : "暂无活动。"}</div>`;
      count.textContent = `共 ${articles.length} 条${q || excludedTypes.size ? `，筛选 ${filtered.length} 条` : ""}`;
      return;
    }
    grid.innerHTML = filtered.map(a => `
      <div class="act-card${newIds.has(a.id) ? " act-new" : ""}">
        <div class="act-title">${escapeHtml(a.title)}</div>
        ${a.tags && !Array.isArray(a.tags) ? `<div class="act-tags">${[...(a.tags.types || []).map(t => { const h=tagHue(t); return `<span class="tag type" style="--tag-bg:${tagBg(h)};--tag-fg:${tagFg(h)};--tag-border:${tagBorder(h)}">${escapeHtml(t)}</span>`; }), ...(a.tags.tokens || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`)].join("")}</div>` : ""}
        <div class="act-meta">
          <span>${fmtDate(a.releaseDate)}</span>
          <div class="act-links">
            <a class="act-link" href="https://www.binance.com/zh-CN/support/announcement/detail/${encodeURIComponent(a.code)}" target="_blank" rel="noopener">查看详情</a>
            <a class="act-link" href="https://www.iruabmkakw.com/zh-CN/support/announcement/detail/${encodeURIComponent(a.code)}" target="_blank" rel="noopener">🇨🇳 国内</a>
          </div>
        </div>
      </div>
    `).join("");
    count.textContent = `共 ${articles.length} 条${q || excludedTypes.size ? `，筛选 ${filtered.length} 条` : ""}`;
  }

  function tagHue(kw) {
    let h = 0;
    for (let i = 0; i < kw.length; i++) h = ((h << 5) - h) + kw.charCodeAt(i);
    return Math.abs(h) % 360;
  }
  function tagBg(h) { return `hsla(${h}, 55%, 45%, 0.12)`; }
  function tagFg(h) { return `hsla(${h}, 55%, 40%, 1)`; }
  function tagBorder(h) { return `hsla(${h}, 55%, 45%, 0.25)`; }

  function escapeHtml(v) {
    return String(v ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c]));
  }

  async function load(refresh) {
    grid.innerHTML = '<div class="act-loading">加载中...</div>';
    refreshBtn.disabled = true;
    try {
      const url = "/api/activities" + (refresh ? "?refresh=1&t=" + Date.now() : "");
      const resp = await fetch(url);
      const data = await resp.json();
      if (!resp.ok || data.error) throw new Error(data.error || "HTTP " + resp.status);
      articles = data.articles || [];
      allTypes = [...new Set(articles.flatMap(a => (a.tags && !Array.isArray(a.tags) && a.tags.types) ? a.tags.types : []))].sort();
      renderFilters();
      if (refresh) {
        newIds = new Set();
        badge(0);
      }
      render();
    } catch (err) {
      grid.innerHTML = `<div class="act-error">加载失败：${escapeHtml(err.message)}</div>`;
      count.textContent = "";
    } finally {
      refreshBtn.disabled = false;
    }
  }

  async function pollChanges() {
    if (!lastCheck) return;
    try {
      const resp = await fetch("/api/activities/changes?since=" + lastCheck);
      const data = await resp.json();
      if (!resp.ok) return;
      if (data.hasNew) {
        const newItems = data.changes.filter(c => c.type === "new");
        for (const c of newItems) {
          newIds.add(c.article.id);
        }
        if (articles.length === 0) {
          await load(false);
        } else {
          if (newIds.size) render();
          allTypes = [...new Set(articles.flatMap(a => (a.tags && !Array.isArray(a.tags) && a.tags.types) ? a.tags.types : []))].sort();
          renderFilters();
        }
        badge(newIds.size);
      }
    } catch (err) {
      console.warn("poll changes error:", err);
    }
  }

  function startPoll() {
    stopPoll();
    pollTimer = setInterval(pollChanges, 30000);
  }

  function stopPoll() {
    if (pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
  }

  searchInput.addEventListener("input", render);
  refreshBtn.addEventListener("click", () => load(true));

  await load();
  lastCheck = Date.now();
  startPoll();

  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      stopPoll();
    } else if (!pollTimer) {
      pollChanges();
      startPoll();
    }
  });
})();
</script>
</body>
</html>
