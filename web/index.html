<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Binance Leaderboard Capture</title>
    <link rel="stylesheet" href="/css888/styles.css?v=20260704h" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">BINANCE LEADBOARD CAPTURE</p>
          <h1>纯抓榜任务台</h1>
          <p class="subtitle">粘贴 Binance 活动 URL 发现 resourceId，点击后抓取排行榜并在线预览。默认行数：UM 400 / SPOT 1000 / SAVING 1500。</p>
          <p style="margin:10px 0 0;font-size:13px;display:flex;gap:14px;flex-wrap:wrap">
            <a href="teams.html" style="color:var(--accent-2)">🏆 团队管理</a>
            <a href="analysis.html" style="color:var(--accent-2)">📊 任务分析</a>
          </p>
        </div>
      </header>

      <section class="capture-card">
        <div class="capture-form">
          <label style="position:relative">
            <span>活动 URL</span>
            <input id="urlInput" autocomplete="off" placeholder="https://www.binance.com/zh-CN/activity/trading-competition/..." />
            <div id="urlSuggestions" class="suggestions"></div>
          </label>
          <button id="discoverBtn" type="button">发现 resourceId</button>
        </div>
        <div id="discoveryResults" class="discovery-section"></div>
      </section>

      <section class="grid">
        <section class="panel jobs-panel">
          <div class="jobs-header">
            <span>任务列表</span>
            <b id="jobCount">0</b>
          </div>
          <div class="filter-bar">
            <span class="filter-group" id="marketFilter">
              <button class="filter-btn" data-market="">全部</button>
              <button class="filter-btn" data-market="um">UM</button>
              <button class="filter-btn" data-market="spot">SPOT</button>
              <button class="filter-btn" data-market="saving">SAVING</button>
            </span>
            <label style="display:inline-flex;align-items:center;gap:4px;font-size:12px;text-transform:none;font-weight:400;cursor:pointer;white-space:nowrap">
              <input id="activeFilter" type="checkbox" checked /> 仅显示未到期
            </label>
            <input id="searchInput" class="filter-search" type="text" placeholder="搜索任务名…" />
          </div>
          <div id="jobList" class="job-list"></div>
        </section>
      </section>
    </main>

    <div id="editModal" class="modal-overlay" style="display:none">
      <div class="modal-box">
        <div class="modal-header">
          <h3>任务配置 <span id="editModalTitle" class="modal-title-suffix"></span></h3>
        </div>
        <div class="modal-tabs">
          <button class="modal-tab active" data-tab="basic">基本</button>
          <button class="modal-tab" data-tab="reward">奖励</button>
        </div>
        <div class="modal-form">
          <div id="tabBasic" class="tab-content">
            <div class="form-row">
              <label class="form-grow">任务名
                <input id="editName" placeholder="SPOT CELO" />
              </label>
            </div>
            <hr class="form-divider">
            <div class="form-row">
              <label>Market
                <select id="editMarket"><option value="um">UM</option><option value="spot">SPOT</option><option value="saving">SAVING</option></select>
              </label>
              <label>Token
                <input id="editToken" placeholder="CELO" />
              </label>
              <label>Symbol
                <input id="editSymbol" placeholder="CELOUSDT" />
              </label>
            </div>
            <div class="form-row">
              <label>活动开始
                <input id="editActivityStart" type="datetime-local" />
              </label>
              <label>活动结束
                <input id="editActivityEnd" type="datetime-local" />
              </label>
              <label></label>
            </div>
            <div class="form-row">
              <label>抓取行数
                <input id="editTop" type="number" min="1" max="10000" value="1000" />
              </label>
              <label></label>
              <label></label>
            </div>
          </div>
          <div id="tabReward" class="tab-content" style="display:none">
            <div class="form-row">
              <label>奖励币种
                <input id="editRewardToken" placeholder="BANK" />
              </label>
              <label>奖励方式
                <select id="editRewardMode">
                  <option value="rank">按排名</option>
                  <option value="total">按总量</option>
                </select>
              </label>
              <label></label>
            </div>
            <hr class="form-divider">
            <div id="rewardRankFields">
              <div class="tier-header"><span>档位</span><span>下限</span><span>~</span><span>上限</span><span> </span><span>奖励数量</span></div>
              <div class="tier-row"><span class="tier-label">第一档</span><input class="tier-min" id="editTier0Min" type="number" min="1" value="6" /><span class="tier-sep">~</span><input class="tier-max" id="editTier0Max" type="number" min="1" value="20" /><span class="tier-arrow">奖励</span><input class="tier-amt" id="editTier0Amt" type="number" min="0" step="1" placeholder="0" /></div>
              <div class="tier-row"><span class="tier-label">第二档</span><input class="tier-min" id="editTier1Min" type="number" min="1" value="21" /><span class="tier-sep">~</span><input class="tier-max" id="editTier1Max" type="number" min="1" value="50" /><span class="tier-arrow">奖励</span><input class="tier-amt" id="editTier1Amt" type="number" min="0" step="1" placeholder="0" /></div>
              <div class="tier-row"><span class="tier-label">第三档</span><input class="tier-min" id="editTier2Min" type="number" min="1" value="51" /><span class="tier-sep">~</span><input class="tier-max" id="editTier2Max" type="number" min="1" value="200" /><span class="tier-arrow">奖励</span><input class="tier-amt" id="editTier2Amt" type="number" min="0" step="1" placeholder="0" /></div>
              <div class="tier-row"><span class="tier-label">第四档</span><input class="tier-min" id="editTier3Min" type="number" min="1" value="201" /><span class="tier-sep">~</span><input class="tier-max" id="editTier3Max" type="number" min="1" value="1000" /><span class="tier-arrow">奖励</span><input class="tier-amt" id="editTier3Amt" type="number" min="0" step="1" placeholder="0" /></div>
            </div>
            <div id="rewardTotalFields" style="display:none">
              <div class="form-row">
                <label>总奖池
                  <input id="editTotalReward" type="number" min="0" step="1" placeholder="10000" />
                </label>
                <label>有效用户数
                  <input id="editEligibleUsers" type="number" min="1" step="1" placeholder="200" />
                </label>
                <label></label>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button id="editCancelBtn" type="button">取消</button>
          <button id="editSaveBtn" type="button">保存</button>
        </div>
      </div>
    </div>

    <script src="/css888/app.js?v=20260704i"></script>
  </body>
</html>
