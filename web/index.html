<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Binance Leaderboard Capture</title>
    <link rel="stylesheet" href="/css888/styles.css?v=20260628a" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">BINANCE LEADERBOARD CAPTURE</p>
          <h1>纯抓榜任务台</h1>
          <p class="subtitle">粘贴 Binance 活动 URL，自动发现 resourceId，抓取前 1000 名并在线预览。</p>
        </div>
      </header>

      <section class="capture-card">
        <form id="scrapeForm" class="capture-form">
          <label>
            <span>活动 URL</span>
            <input name="url" required autocomplete="off" placeholder="https://www.binance.com/zh-CN/activity/trading-competition/..." />
          </label>
          <button type="submit">开始抓取 Top 1000</button>
          <input name="browserWaitMs" type="hidden" value="30000" />
          <input name="proxy" type="hidden" value="auto" />
        </form>
        <div id="derivedBox" class="derived">粘贴活动 URL 后自动识别 spot/um 和 symbol。</div>
      </section>

      <section class="grid">
        <section class="panel jobs-panel">
          <div class="jobs-header">
            <span>快捷任务</span>
            <b id="jobCount">0</b>
          </div>
          <div id="jobList" class="job-list"></div>
        </section>
      </section>
    </main>

    <script src="/css888/app.js?v=20260628a"></script>
  </body>
</html>
